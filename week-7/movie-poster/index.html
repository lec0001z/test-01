  <!-- noonnu.cc 웹폰트 -->
  <style>

      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2304-1@1.0/SB-AggroOTF-B.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'SBAggroL';

    /* 카페24 둥근모꼴 — 보조 정보 */

    .f-ssur    { font-family: 'Cafe24Ssurround', sans-serif; }

    /* Film grain */
    .grain::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");

      opacity: 0.22;
      pointer-events: none;
    }

    .vignette {
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.55) 75%, rgba(0,0,0,0.95) 100%);

    /* Vertical Korean text */
    .vert-rl { writing-mode: vertical-rl; text-orientation: mixed; }

    /* Shake/glitch */

      0%, 100% { transform: translate(0); }
      20% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-1px, 0); }
      80% { transform: translate(1px, 1px); }
    }
    .glitch:hover { animation: glitch 0.4s steps(1) infinite; }

    /* Flicker */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.4; }
    }

    const { useState, useEffect } = React;

    // ========================================
    // ⏱ Live Countdown
    // ========================================
    function Countdown({ className = '' }) {
      const [time, setTime] = useState({ h: 23, m: 59, s: 59 });
      useEffect(() => {
        const id = setInterval(() => {
          setTime(({ h, m, s }) => {
            s -= 1;
            if (s < 0) { s = 59; m -= 1; }
            if (m < 0) { m = 59; h -= 1; }
            if (h < 0) return { h: 23, m: 59, s: 59 };
            return { h, m, s };
          });
        }, 1000);
        return () => clearInterval(id);
      }, []);
      const pad = (n) => String(n).padStart(2, '0');
      return (
        <span className={`f-mono ${className}`}>
          {pad(time.h)}:{pad(time.m)}:{pad(time.s)}
        </span>
      );
    }
