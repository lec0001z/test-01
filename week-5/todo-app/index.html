<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .fade-in { animation: fadeIn 0.18s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useContext, createContext, useCallback } = React;

    // ============================================================
    //  설정
    // ============================================================
    const API_BASE_URL = window.location.origin + "/api";
    const TOKEN_KEY = "todo-app:token";

    // ============================================================
    //  🎨 Design System
    // ============================================================

    function Button({ variant = "primary", size = "md", className = "", children, ...props }) {
      const base = "inline-flex items-center justify-center font-medium rounded-md transition-colors disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus-visible:ring-2 focus-visible:ring-neutral-900 focus-visible:ring-offset-2";
      const sizes = { sm: "h-8 px-3 text-xs", md: "h-10 px-4 text-sm", lg: "h-11 px-5 text-sm" };
      const variants = {
        primary: "bg-neutral-900 text-white hover:bg-neutral-700",
        secondary: "bg-white text-neutral-900 border border-neutral-200 hover:bg-neutral-100",
        ghost: "bg-transparent text-neutral-500 hover:text-neutral-900 hover:bg-neutral-100",
        danger: "bg-transparent text-neutral-400 hover:text-red-600",
      };
      return (
        <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    const Input = React.forwardRef(function Input({ className = "", label, error, id, ...props }, ref) {
      const inputId = id || `inp-${Math.random().toString(36).slice(2, 8)}`;
      return (
        <div className="w-full">
          {label && (
            <label htmlFor={inputId} className="block mb-1.5 text-xs text-neutral-600">
              {label}
            </label>
          )}
          <input
            id={inputId}
            ref={ref}
            className={`w-full h-11 px-4 bg-white border rounded-md text-sm placeholder:text-neutral-400 focus:outline-none transition-colors ${
              error ? "border-red-400 focus:border-red-500" : "border-neutral-200 focus:border-neutral-900"
            } ${className}`}
            {...props}
          />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    });

    function Checkbox({ checked, onChange, ariaLabel }) {
      return (
        <button
          role="checkbox"
          aria-checked={checked}
          aria-label={ariaLabel}
          onClick={onChange}
          className={`shrink-0 w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${
            checked ? "bg-neutral-900 border-neutral-900" : "bg-white border-neutral-300 hover:border-neutral-500"
          }`}
        >
          {checked && (
            <svg className="w-3 h-3 text-white" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="3">
              <path d="M5 10l3 3 7-7" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          )}
        </button>
      );
    }

    function FilterTab({ active, children, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`h-8 px-3 text-xs rounded-md transition-colors ${
            active ? "bg-neutral-900 text-white" : "text-neutral-500 hover:text-neutral-900"
          }`}
        >
          {children}
        </button>
      );
    }

    function Spinner() {
      return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="w-5 h-5 border-2 border-neutral-300 border-t-neutral-900 rounded-full animate-spin" />
        </div>
      );
    }

    // ============================================================
    //  🔀 Hash Router
    // ============================================================

    function getHashPath() {
      const h = window.location.hash || "#/";
      return h.startsWith("#") ? h.slice(1) : h;
    }

    function useHashRoute() {
      const [path, setPath] = useState(getHashPath());
      useEffect(() => {
        const onChange = () => setPath(getHashPath());
        window.addEventListener("hashchange", onChange);
        return () => window.removeEventListener("hashchange", onChange);
      }, []);
      return [path, (next) => { window.location.hash = next; }];
    }

    function navigate(to) { window.location.hash = to; }

    function Link({ to, className = "", children, ...props }) {
      return (
        <a
          href={`#${to}`}
          className={`text-neutral-900 underline-offset-4 hover:underline ${className}`}
          {...props}
        >
          {children}
        </a>
      );
    }

    // ============================================================
    //  🔐 Auth Context + API helper
    // ============================================================

    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    async function apiFetch(endpoint, { method = "GET", body, token } = {}) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(`${API_BASE_URL}${endpoint}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 204) return null;
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`);
      return data;
    }

    function AuthProvider({ children }) {
      const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY));
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(!!token);

      // 토큰이 있으면 유효성 + 사용자 정보 로드
      useEffect(() => {
        if (!token) { setUser(null); setLoading(false); return; }
        let alive = true;
        setLoading(true);
        apiFetch("/auth/me", { token })
          .then((d) => { if (alive) setUser(d.user); })
          .catch(() => {
            if (!alive) return;
            localStorage.removeItem(TOKEN_KEY);
            setToken(null);
            setUser(null);
          })
          .finally(() => { if (alive) setLoading(false); });
        return () => { alive = false; };
      }, [token]);

      const login = useCallback(async (email, password) => {
        const data = await apiFetch("/auth/login", { method: "POST", body: { email, password } });
        localStorage.setItem(TOKEN_KEY, data.token);
        setToken(data.token);
        setUser(data.user);
      }, []);

      const signup = useCallback(async (email, password) => {
        const data = await apiFetch("/auth/signup", { method: "POST", body: { email, password } });
        localStorage.setItem(TOKEN_KEY, data.token);
        setToken(data.token);
        setUser(data.user);
      }, []);

      const logout = useCallback(() => {
        localStorage.removeItem(TOKEN_KEY);
        setToken(null);
        setUser(null);
        navigate("/login");
      }, []);

      const value = { token, user, loading, login, signup, logout };
      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    // ============================================================
    //  🧩 Layout
    // ============================================================

    function AppHeader() {
      const { user, logout } = useAuth();
      return (
        <header className="mb-8 flex items-start justify-between">
          <div>
            <h1 className="text-2xl font-semibold tracking-tight">Todo</h1>
            {user && <p className="mt-1 text-sm text-neutral-500">{user.email}</p>}
          </div>
          {user && (
            <Button variant="ghost" size="sm" onClick={logout}>로그아웃</Button>
          )}
        </header>
      );
    }

    // ============================================================
    //  📄 Auth Pages
    // ============================================================

    function AuthShell({ title, subtitle, children }) {
      return (
        <main className="min-h-screen flex items-center justify-center px-4 py-12">
          <div className="w-full max-w-sm">
            <div className="mb-8 text-center">
              <h1 className="text-2xl font-semibold tracking-tight">{title}</h1>
              <p className="mt-1 text-sm text-neutral-500">{subtitle}</p>
            </div>
            {children}
          </div>
        </main>
      );
    }

    function LoginPage() {
      const { login } = useAuth();
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [submitting, setSubmitting] = useState(false);

      const onSubmit = async (e) => {
        e.preventDefault();
        setError("");
        setSubmitting(true);
        try {
          await login(email, password);
          navigate("/");
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <AuthShell title="로그인" subtitle="이메일로 로그인하세요">
          <form onSubmit={onSubmit} className="space-y-3">
            <Input
              type="email"
              label="이메일"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="you@example.com"
              autoComplete="email"
              required
            />
            <Input
              type="password"
              label="비밀번호"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              placeholder="••••••••"
              autoComplete="current-password"
              required
            />
            {error && <p className="text-xs text-red-500">{error}</p>}
            <Button type="submit" size="lg" className="w-full" disabled={submitting}>
              {submitting ? "로그인 중..." : "로그인"}
            </Button>
          </form>
          <p className="mt-6 text-center text-xs text-neutral-500">
            계정이 없으신가요? <Link to="/signup">회원가입</Link>
          </p>
        </AuthShell>
      );
    }

    function SignupPage() {
      const { signup } = useAuth();
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [password2, setPassword2] = useState("");
      const [error, setError] = useState("");
      const [submitting, setSubmitting] = useState(false);

      const onSubmit = async (e) => {
        e.preventDefault();
        setError("");
        if (password.length < 6) { setError("비밀번호는 6자 이상이어야 합니다."); return; }
        if (password !== password2) { setError("비밀번호가 일치하지 않습니다."); return; }
        setSubmitting(true);
        try {
          await signup(email, password);
          navigate("/");
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <AuthShell title="회원가입" subtitle="새 계정을 만드세요">
          <form onSubmit={onSubmit} className="space-y-3">
            <Input
              type="email"
              label="이메일"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="you@example.com"
              autoComplete="email"
              required
            />
            <Input
              type="password"
              label="비밀번호 (6자 이상)"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              placeholder="••••••••"
              autoComplete="new-password"
              required
            />
            <Input
              type="password"
              label="비밀번호 확인"
              value={password2}
              onChange={(e) => setPassword2(e.target.value)}
              placeholder="••••••••"
              autoComplete="new-password"
              required
            />
            {error && <p className="text-xs text-red-500">{error}</p>}
            <Button type="submit" size="lg" className="w-full" disabled={submitting}>
              {submitting ? "가입 중..." : "회원가입"}
            </Button>
          </form>
          <p className="mt-6 text-center text-xs text-neutral-500">
            이미 계정이 있으신가요? <Link to="/login">로그인</Link>
          </p>
        </AuthShell>
      );
    }

    // ============================================================
    //  📄 Todo Page
    // ============================================================

    function EmptyState({ filter }) {
      const messages = {
        all: "할 일이 없습니다.",
        active: "진행 중인 항목이 없습니다.",
        done: "완료된 항목이 없습니다.",
      };
      return <div className="py-16 text-center text-sm text-neutral-400">{messages[filter]}</div>;
    }

    function TodoItem({ todo, onToggle, onDelete }) {
      return (
        <li className="fade-in group flex items-center gap-3 py-3 border-b border-neutral-100 last:border-0">
          <Checkbox
            checked={todo.done}
            onChange={() => onToggle(todo)}
            ariaLabel={`${todo.text} 완료 토글`}
          />
          <span
            className={`flex-1 text-sm transition-colors ${
              todo.done ? "text-neutral-400 line-through" : "text-neutral-900"
            }`}
          >
            {todo.text}
          </span>
          <Button
            variant="danger"
            size="sm"
            onClick={() => onDelete(todo.id)}
            className="opacity-0 group-hover:opacity-100"
            aria-label="삭제"
          >
            삭제
          </Button>
        </li>
      );
    }

    function TodoPage() {
      const { token, user } = useAuth();
      const [todos, setTodos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [text, setText] = useState("");
      const [filter, setFilter] = useState("all");
      const [error, setError] = useState("");
      const inputRef = useRef(null);

      const load = useCallback(async () => {
        try {
          setError("");
          const data = await apiFetch("/todos", { token });
          setTodos(data.todos);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [token]);

      useEffect(() => { load(); }, [load]);

      const remaining = useMemo(() => todos.filter((t) => !t.done).length, [todos]);
      const visible = useMemo(() => {
        if (filter === "active") return todos.filter((t) => !t.done);
        if (filter === "done")   return todos.filter((t) => t.done);
        return todos;
      }, [todos, filter]);

      const addTodo = async (e) => {
        e.preventDefault();
        const value = text.trim();
        if (!value) return;
        try {
          const data = await apiFetch("/todos", { method: "POST", body: { text: value }, token });
          setTodos((prev) => [data.todo, ...prev]);
          setText("");
          inputRef.current?.focus();
        } catch (e) { setError(e.message); }
      };

      const toggleTodo = async (todo) => {
        try {
          const data = await apiFetch(`/todos/${todo.id}`, {
            method: "PATCH", body: { done: !todo.done }, token,
          });
          setTodos((prev) => prev.map((t) => (t.id === todo.id ? data.todo : t)));
        } catch (e) { setError(e.message); }
      };

      const deleteTodo = async (id) => {
        try {
          await apiFetch(`/todos/${id}`, { method: "DELETE", token });
          setTodos((prev) => prev.filter((t) => t.id !== id));
        } catch (e) { setError(e.message); }
      };

      const clearDone = async () => {
        try {
          await apiFetch(`/todos?done=true`, { method: "DELETE", token });
          setTodos((prev) => prev.filter((t) => !t.done));
        } catch (e) { setError(e.message); }
      };

      return (
        <main className="min-h-screen flex justify-center px-4 py-12 sm:py-20">
          <div className="w-full max-w-md">
            <AppHeader />

            <p className="mb-6 text-sm text-neutral-500">
              {todos.length === 0 ? "오늘은 무엇을 해볼까요?" : `${remaining}개 남음 · 총 ${todos.length}개`}
            </p>

            <form onSubmit={addTodo} className="flex gap-2 mb-6">
              <Input
                ref={inputRef}
                value={text}
                onChange={(e) => setText(e.target.value)}
                placeholder="새 할 일 추가..."
                aria-label="새 할 일"
              />
              <Button type="submit" size="lg" disabled={!text.trim()}>추가</Button>
            </form>

            <div className="flex items-center justify-between mb-2">
              <div className="flex gap-1">
                <FilterTab active={filter === "all"} onClick={() => setFilter("all")}>전체</FilterTab>
                <FilterTab active={filter === "active"} onClick={() => setFilter("active")}>진행 중</FilterTab>
                <FilterTab active={filter === "done"} onClick={() => setFilter("done")}>완료</FilterTab>
              </div>
              {todos.some((t) => t.done) && (
                <Button variant="ghost" size="sm" onClick={clearDone}>완료 항목 지우기</Button>
              )}
            </div>

            <section className="bg-white border border-neutral-100 rounded-lg px-4">
              {loading ? (
                <div className="py-16 text-center text-sm text-neutral-400">불러오는 중...</div>
              ) : visible.length === 0 ? (
                <EmptyState filter={filter} />
              ) : (
                <ul>
                  {visible.map((todo) => (
                    <TodoItem
                      key={todo.id}
                      todo={todo}
                      onToggle={toggleTodo}
                      onDelete={deleteTodo}
                    />
                  ))}
                </ul>
              )}
            </section>

            {error && <p className="mt-4 text-xs text-red-500 text-center">{error}</p>}
          </div>
        </main>
      );
    }

    // ============================================================
    //  🚀 App
    // ============================================================

    function Routes() {
      const [path] = useHashRoute();
      const { user, loading } = useAuth();

      // 리다이렉트는 항상 호출되는 useEffect 안에서 처리 (Rules of Hooks 준수)
      useEffect(() => {
        if (loading) return;
        if (!user && path !== "/login" && path !== "/signup") {
          navigate("/login");
        } else if (user && (path === "/login" || path === "/signup")) {
          navigate("/");
        }
      }, [user, loading, path]);

      if (loading) return <Spinner />;

      if (!user) {
        if (path === "/signup") return <SignupPage />;
        if (path === "/login")  return <LoginPage />;
        return <Spinner />;
      }

      if (path === "/login" || path === "/signup") return <Spinner />;
      return <TodoPage />;
    }

    function App() {
      return (
        <AuthProvider>
          <Routes />
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
