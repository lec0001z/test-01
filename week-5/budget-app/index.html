<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부 (Server + Supabase)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-emerald-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const API = '/api';

    const TYPE_LABEL = { income: '수입', expense: '지출' };
    const TYPE_BADGE = {
      income:  'bg-emerald-100 text-emerald-700',
      expense: 'bg-rose-100 text-rose-700',
    };

    const fmtKRW = (n) => Number(n || 0).toLocaleString('ko-KR') + '원';
    const today = () => new Date().toISOString().slice(0, 10);

    // --------------------------------------------------------
    //  공용 컴포넌트
    // --------------------------------------------------------
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white/90 backdrop-blur shadow-sm border border-slate-200 rounded-2xl p-5 ${className}`}>
          {children}
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <label className="block">
          <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>
          {children}
        </label>
      );
    }

    const inputBase =
      'w-full px-3 py-2 border border-slate-300 rounded-lg bg-white placeholder-slate-400 text-sm ' +
      'focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent';

    // --------------------------------------------------------
    //  입력 폼
    // --------------------------------------------------------
    function TransactionForm({ categories, onCreated }) {
      const [type, setType]           = useState('expense');
      const [occurredOn, setOccurred] = useState(today());
      const [amount, setAmount]       = useState('');
      const [category, setCategory]   = useState('식비');
      const [customCategory, setCC]   = useState('');
      const [memo, setMemo]           = useState('');
      const [submitting, setSubmit]   = useState(false);
      const [error, setError]         = useState('');

      const finalCategory = category === '__custom__' ? customCategory.trim() : category;

      const reset = () => {
        setAmount('');
        setMemo('');
        setError('');
        setCC('');
        setCategory(type === 'income' ? '급여' : '식비');
      };

      const submit = async (e) => {
        e.preventDefault();
        setError('');

        const amt = Number(amount);
        if (!Number.isFinite(amt) || amt <= 0) {
          setError('금액은 0보다 큰 숫자여야 합니다.');
          return;
        }
        if (!finalCategory) {
          setError('카테고리를 선택하거나 직접 입력해 주세요.');
          return;
        }

        setSubmit(true);
        try {
          const res = await fetch(`${API}/transactions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type,
              amount: amt,
              category: finalCategory,
              memo,
              occurred_on: occurredOn,
            }),
          });
          const json = await res.json();
          if (!res.ok || !json.success) {
            throw new Error(json.message || '등록에 실패했습니다.');
          }
          onCreated(json.data);
          reset();
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmit(false);
        }
      };

      return (
        <Card>
          <h2 className="text-lg font-bold text-slate-800 mb-4">새 내역 등록</h2>

          <div className="flex gap-2 mb-4">
            {['expense', 'income'].map((t) => (
              <button
                key={t}
                type="button"
                onClick={() => {
                  setType(t);
                  setCategory(t === 'income' ? '급여' : '식비');
                }}
                className={`flex-1 py-2 rounded-lg text-sm font-semibold transition
                  ${type === t
                    ? (t === 'expense'
                        ? 'bg-rose-500 text-white shadow'
                        : 'bg-emerald-500 text-white shadow')
                    : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
              >
                {TYPE_LABEL[t]}
              </button>
            ))}
          </div>

          <form onSubmit={submit} className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <Field label="날짜">
                <input
                  type="date"
                  value={occurredOn}
                  onChange={(e) => setOccurred(e.target.value)}
                  className={inputBase}
                  required
                />
              </Field>
              <Field label="금액 (원)">
                <input
                  type="number"
                  inputMode="numeric"
                  min="1"
                  step="1"
                  value={amount}
                  onChange={(e) => setAmount(e.target.value)}
                  placeholder="예: 12000"
                  className={inputBase}
                  required
                />
              </Field>
            </div>

            <Field label="카테고리">
              <select
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                className={inputBase}
              >
                {categories.map((c) => (
                  <option key={c} value={c}>{c}</option>
                ))}
                <option value="__custom__">+ 직접 입력</option>
              </select>
              {category === '__custom__' && (
                <input
                  type="text"
                  value={customCategory}
                  onChange={(e) => setCC(e.target.value)}
                  placeholder="카테고리 이름"
                  maxLength={30}
                  className={`${inputBase} mt-2`}
                />
              )}
            </Field>

            <Field label="메모 (선택)">
              <input
                type="text"
                value={memo}
                onChange={(e) => setMemo(e.target.value)}
                placeholder="예: 점심 김치찌개"
                maxLength={200}
                className={inputBase}
              />
            </Field>

            {error && (
              <p className="text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">
                {error}
              </p>
            )}

            <button
              type="submit"
              disabled={submitting}
              className="w-full py-2.5 rounded-lg bg-slate-900 text-white text-sm font-semibold
                         hover:bg-slate-800 disabled:opacity-50 transition"
            >
              {submitting ? '저장 중…' : '등록'}
            </button>
          </form>
        </Card>
      );
    }

    // --------------------------------------------------------
    //  요약 카드 (총수입 / 총지출 / 잔액)
    // --------------------------------------------------------
    function SummaryHeader({ summary }) {
      if (!summary) return null;
      const { totalIncome, totalExpense, net } = summary;
      return (
        <div className="grid grid-cols-3 gap-3">
          <Card className="text-center">
            <div className="text-xs text-slate-500 mb-1">총 수입</div>
            <div className="text-lg font-bold text-emerald-600">{fmtKRW(totalIncome)}</div>
          </Card>
          <Card className="text-center">
            <div className="text-xs text-slate-500 mb-1">총 지출</div>
            <div className="text-lg font-bold text-rose-600">{fmtKRW(totalExpense)}</div>
          </Card>
          <Card className="text-center">
            <div className="text-xs text-slate-500 mb-1">잔액 (수입-지출)</div>
            <div className={`text-lg font-bold ${net >= 0 ? 'text-slate-800' : 'text-rose-600'}`}>
              {fmtKRW(net)}
            </div>
          </Card>
        </div>
      );
    }

    // --------------------------------------------------------
    //  카테고리별 합계
    // --------------------------------------------------------
    function CategoryBreakdown({ summary }) {
      if (!summary) return null;
      const expense = summary.byCategory.filter((r) => r.type === 'expense');
      const income  = summary.byCategory.filter((r) => r.type === 'income');

      const Section = ({ title, rows, color, total }) => {
        if (rows.length === 0) {
          return (
            <Card>
              <h3 className="font-bold text-slate-800 mb-2">{title}</h3>
              <p className="text-sm text-slate-400">아직 데이터가 없습니다.</p>
            </Card>
          );
        }
        const max = Math.max(...rows.map((r) => r.total));
        return (
          <Card>
            <h3 className="font-bold text-slate-800 mb-3 flex justify-between">
              <span>{title}</span>
              <span className={color}>{fmtKRW(total)}</span>
            </h3>
            <ul className="space-y-2.5">
              {rows.map((r) => (
                <li key={`${r.type}-${r.category}`}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="font-medium text-slate-700">
                      {r.category} <span className="text-slate-400 text-xs">({r.count}건)</span>
                    </span>
                    <span className="font-semibold text-slate-800">{fmtKRW(r.total)}</span>
                  </div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full ${color === 'text-rose-600' ? 'bg-rose-400' : 'bg-emerald-400'}`}
                      style={{ width: `${(r.total / max) * 100}%` }}
                    />
                  </div>
                </li>
              ))}
            </ul>
          </Card>
        );
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          <Section title="지출 카테고리" rows={expense} color="text-rose-600"    total={summary.totalExpense} />
          <Section title="수입 카테고리" rows={income}  color="text-emerald-600" total={summary.totalIncome} />
        </div>
      );
    }

    // --------------------------------------------------------
    //  내역 목록
    // --------------------------------------------------------
    function TransactionList({ items, onDelete }) {
      if (items.length === 0) {
        return (
          <Card>
            <p className="text-sm text-slate-400 text-center py-6">등록된 내역이 없습니다.</p>
          </Card>
        );
      }
      return (
        <Card className="p-0 overflow-hidden">
          <ul className="divide-y divide-slate-100">
            {items.map((t) => (
              <li key={t.id} className="flex items-center gap-3 px-5 py-3 hover:bg-slate-50">
                <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${TYPE_BADGE[t.type]}`}>
                  {TYPE_LABEL[t.type]}
                </span>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-2">
                    <span className="text-sm font-semibold text-slate-800">{t.category}</span>
                    <span className="text-xs text-slate-400">{t.occurred_on}</span>
                  </div>
                  {t.memo && <p className="text-xs text-slate-500 truncate">{t.memo}</p>}
                </div>
                <div className={`text-sm font-bold ${t.type === 'expense' ? 'text-rose-600' : 'text-emerald-600'}`}>
                  {t.type === 'expense' ? '-' : '+'}{fmtKRW(t.amount)}
                </div>
                <button
                  onClick={() => onDelete(t.id)}
                  className="text-xs text-slate-400 hover:text-rose-500"
                  title="삭제"
                >
                  ✕
                </button>
              </li>
            ))}
          </ul>
        </Card>
      );
    }

    // --------------------------------------------------------
    //  메인 앱
    // --------------------------------------------------------
    function App() {
      const [items, setItems]           = useState([]);
      const [summary, setSummary]       = useState(null);
      const [categories, setCategories] = useState([]);
      const [loading, setLoading]       = useState(true);
      const [loadError, setLoadError]   = useState('');

      const load = useCallback(async () => {
        setLoadError('');
        try {
          const [listRes, sumRes, catRes] = await Promise.all([
            fetch(`${API}/transactions`).then((r) => r.json()),
            fetch(`${API}/transactions/summary`).then((r) => r.json()),
            fetch(`${API}/categories`).then((r) => r.json()),
          ]);
          if (!listRes.success) throw new Error(listRes.message || '내역 조회 실패');
          if (!sumRes.success)  throw new Error(sumRes.message  || '합계 조회 실패');
          setItems(listRes.data);
          setSummary(sumRes.data);
          setCategories(catRes.success ? catRes.data : []);
        } catch (err) {
          setLoadError(err.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleCreated = useCallback(() => {
        // 신규 등록 후 목록/합계 모두 다시 불러오기
        load();
      }, [load]);

      const handleDelete = useCallback(async (id) => {
        if (!confirm('이 내역을 삭제하시겠어요?')) return;
        try {
          const res = await fetch(`${API}/transactions/${id}`, { method: 'DELETE' });
          const json = await res.json();
          if (!res.ok || !json.success) throw new Error(json.message || '삭제 실패');
          load();
        } catch (err) {
          alert(err.message);
        }
      }, [load]);

      return (
        <div className="max-w-5xl mx-auto px-4 py-8 space-y-6">
          <header className="flex items-end justify-between">
            <div>
              <h1 className="text-2xl font-bold text-slate-800">📒 나의 가계부</h1>
              <p className="text-sm text-slate-500 mt-1">Server + Supabase 로 저장되는 수입/지출 기록</p>
            </div>
            <span className="text-xs text-slate-400">총 {items.length}건</span>
          </header>

          {loadError && (
            <Card className="border-rose-200 bg-rose-50/60">
              <p className="text-sm text-rose-600">⚠ {loadError}</p>
            </Card>
          )}

          <SummaryHeader summary={summary} />

          <div className="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-6">
            <TransactionForm categories={categories} onCreated={handleCreated} />

            <div className="space-y-6">
              <CategoryBreakdown summary={summary} />

              <section>
                <h2 className="text-lg font-bold text-slate-800 mb-2">내역 목록</h2>
                {loading
                  ? <Card><p className="text-sm text-slate-400 text-center py-6">불러오는 중…</p></Card>
                  : <TransactionList items={items} onDelete={handleDelete} />
                }
              </section>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
