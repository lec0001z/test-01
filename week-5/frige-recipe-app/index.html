<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고 레시피 - 재료로 만드는 요리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 카테고리 색상이 DB에서 동적으로 들어오므로, Tailwind JIT가 미리 인식하도록 safelist 등록
    tailwind.config = {
      safelist: [
        'bg-green-100',  'text-green-800',
        'bg-red-100',    'text-red-800',
        'bg-blue-100',   'text-blue-800',
        'bg-yellow-100', 'text-yellow-800',
        'bg-amber-100',  'text-amber-800',
        'bg-purple-100', 'text-purple-800',
        'bg-gray-100',   'text-gray-800',
      ],
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    body { background: linear-gradient(135deg, #fef3c7 0%, #fee2e2 50%, #fce7f3 100%); min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useContext, createContext, useRef } = React;

    // ========================================
    // 📡 API 헬퍼
    // ========================================
    const API_BASE_URL = '/api';

    async function api(endpoint, options = {}) {
      const res = await fetch(`${API_BASE_URL}${endpoint}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      let body = null;
      try { body = await res.json(); } catch {}
      if (!res.ok || (body && body.success === false)) {
        const msg = (body && body.message) || `HTTP ${res.status}`;
        const err = new Error(msg);
        err.status = res.status;
        throw err;
      }
      return body ? body.data : null;
    }

    // ========================================
    // 🛠️ 재료 매칭 유틸 (클라이언트 사이드 보조)
    // ========================================
    const normalize = (s) => (s || '').replace(/\s+/g, '').toLowerCase();

    const ingredientMatches = (have, need) => {
      const h = normalize(have);
      const n = normalize(need);
      return h === n || h.includes(n) || n.includes(h);
    };

    const computeRecipeMatches = (recipes, fridgeItems) => {
      const haveNames = fridgeItems.map(i => i.name);
      return recipes.map(r => {
        const ings = r.ingredients || [];
        const matched = ings.filter(need => haveNames.some(have => ingredientMatches(have, need)));
        const missing = ings.filter(need => !haveNames.some(have => ingredientMatches(have, need)));
        const ratio = ings.length === 0 ? 0 : matched.length / ings.length;
        return { ...r, matched, missing, ratio, percent: Math.round(ratio * 100) };
      }).sort((a, b) => b.ratio - a.ratio || a.missing.length - b.missing.length);
    };

    // ========================================
    // 🎨 디자인 시스템
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, className = '', children, type = 'button', ...rest }) {
      const variants = {
        primary:   'bg-rose-500 hover:bg-rose-600 text-white shadow-sm',
        secondary: 'bg-white hover:bg-gray-50 text-gray-800 border border-gray-300',
        danger:    'bg-red-500 hover:bg-red-600 text-white',
        ghost:     'bg-transparent hover:bg-gray-100 text-gray-700',
        success:   'bg-emerald-500 hover:bg-emerald-600 text-white',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-5 py-3 text-base',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`rounded-lg font-medium transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    const Input = React.forwardRef(function Input({ label, error, className = '', ...props }, ref) {
      return (
        <label className="block">
          {label && <span className="block text-sm font-medium text-gray-700 mb-1">{label}</span>}
          <input
            ref={ref}
            className={`w-full px-3 py-2 border rounded-lg outline-none transition-colors ${error ? 'border-red-400 focus:border-red-500' : 'border-gray-300 focus:border-rose-500'} ${className}`}
            {...props}
          />
          {error && <span className="block text-xs text-red-500 mt-1">{error}</span>}
        </label>
      );
    });

    function Select({ label, options, className = '', ...props }) {
      return (
        <label className="block">
          {label && <span className="block text-sm font-medium text-gray-700 mb-1">{label}</span>}
          <select
            className={`w-full px-3 py-2 border border-gray-300 rounded-lg outline-none bg-white focus:border-rose-500 ${className}`}
            {...props}
          >
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </label>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ className = '', children }) {
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${className}`}>
          {children}
        </span>
      );
    }

    function Empty({ icon = '📭', title, description }) {
      return (
        <div className="text-center py-12 text-gray-500">
          <div className="text-5xl mb-3">{icon}</div>
          <p className="font-medium text-gray-700">{title}</p>
          {description && <p className="text-sm mt-1">{description}</p>}
        </div>
      );
    }

    function Spinner({ className = '' }) {
      return (
        <span className={`inline-block w-5 h-5 border-2 border-rose-300 border-t-rose-600 rounded-full spin ${className}`} />
      );
    }

    function Toast({ message, type = 'error', onClose }) {
      useEffect(() => {
        if (!message) return;
        const t = setTimeout(onClose, 3000);
        return () => clearTimeout(t);
      }, [message, onClose]);
      if (!message) return null;
      const styles = {
        error:   'bg-red-500 text-white',
        success: 'bg-emerald-500 text-white',
      };
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 fade-in">
          <div className={`px-4 py-2.5 rounded-lg shadow-lg ${styles[type]} text-sm font-medium`}>
            {message}
          </div>
        </div>
      );
    }

    // ========================================
    // 🔀 해시 라우터
    // ========================================
    const RouterContext = createContext(null);

    function Router({ children }) {
      const [path, setPath] = useState(() => window.location.hash.replace(/^#/, '') || '/');
      useEffect(() => {
        const onHash = () => setPath(window.location.hash.replace(/^#/, '') || '/');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return (
        <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>
      );
    }

    const useRouter = () => useContext(RouterContext);

    function matchRoute(routePath, currentPath) {
      const rp = routePath.split('/').filter(Boolean);
      const cp = currentPath.split('/').filter(Boolean);
      if (rp.length !== cp.length) return null;
      const params = {};
      for (let i = 0; i < rp.length; i++) {
        if (rp[i].startsWith(':')) params[rp[i].slice(1)] = decodeURIComponent(cp[i]);
        else if (rp[i] !== cp[i]) return null;
      }
      return params;
    }

    function Routes({ routes }) {
      const { path } = useRouter();
      for (const r of routes) {
        const params = matchRoute(r.path, path);
        if (params) return React.cloneElement(r.element, { params });
      }
      return <NotFoundPage />;
    }

    function Link({ to, className = '', children, ...rest }) {
      const { navigate } = useRouter();
      return (
        <a
          href={`#${to}`}
          onClick={(e) => { e.preventDefault(); navigate(to); }}
          className={className}
          {...rest}
        >{children}</a>
      );
    }

    // ========================================
    // 🧩 공통 레이아웃
    // ========================================
    function Header({ ingredientCount }) {
      const { path } = useRouter();
      const navItem = (to, label) => {
        const active = path === to || (to !== '/' && path.startsWith(to));
        return (
          <Link
            to={to}
            className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-rose-500 text-white' : 'text-gray-700 hover:bg-rose-100'}`}
          >{label}</Link>
        );
      };
      return (
        <header className="sticky top-0 z-30 backdrop-blur bg-white/80 border-b border-rose-100">
          <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <Link to="/" className="flex items-center gap-2 group">
              <span className="text-2xl group-hover:scale-110 transition-transform">🧊</span>
              <span className="text-lg font-bold text-gray-900">냉장고 레시피</span>
            </Link>
            <nav className="flex items-center gap-1">
              {navItem('/', `재료 ${ingredientCount > 0 ? `(${ingredientCount})` : ''}`)}
              {navItem('/recipes', '레시피')}
            </nav>
          </div>
        </header>
      );
    }

    function PageContainer({ children }) {
      return <main className="max-w-5xl mx-auto px-4 py-6 fade-in">{children}</main>;
    }

    // ========================================
    // 📄 페이지: 재료 관리
    // ========================================
    function FridgePage({ categories, ingredients, addIngredient, removeIngredient, clearAll }) {
      const [name, setName] = useState('');
      const [category, setCategory] = useState(categories[0]?.id || 'vegetable');
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);
      const inputRef = useRef(null);

      const grouped = useMemo(() => {
        const map = {};
        for (const c of categories) map[c.id] = [];
        for (const i of ingredients) (map[i.category] || (map.etc = map.etc || [])).push(i);
        return map;
      }, [ingredients, categories]);

      const onSubmit = async (e) => {
        e.preventDefault();
        const trimmed = name.trim();
        if (!trimmed) { setError('재료 이름을 입력해주세요.'); return; }
        if (ingredients.some(i => normalize(i.name) === normalize(trimmed))) {
          setError('이미 추가된 재료입니다.'); return;
        }
        setBusy(true);
        try {
          await addIngredient({ name: trimmed, category });
          setName(''); setError('');
          inputRef.current?.focus();
        } catch (err) {
          setError(err.message);
        } finally {
          setBusy(false);
        }
      };

      const onQuickAdd = async (quick) => {
        if (ingredients.some(i => normalize(i.name) === normalize(quick))) return;
        const cat = ['계란','밥'].includes(quick) ? 'etc'
          : ['김치','파','양파','마늘'].includes(quick) ? 'vegetable'
          : 'sauce';
        try {
          await addIngredient({ name: quick, category: cat });
        } catch { /* 에러는 상위 토스트에서 처리됨 */ }
      };

      return (
        <div className="space-y-6">
          <section>
            <h1 className="text-2xl font-bold text-gray-900 mb-1">🧊 내 냉장고</h1>
            <p className="text-gray-600 text-sm">냉장고 속 재료를 등록하면 만들 수 있는 요리를 추천해 드려요.</p>
          </section>

          <Card className="p-5">
            <form onSubmit={onSubmit} className="grid sm:grid-cols-[1fr_180px_auto] gap-3">
              <Input
                ref={inputRef}
                label="재료 이름"
                placeholder="예: 김치, 계란, 양파"
                value={name}
                onChange={(e) => { setName(e.target.value); if (error) setError(''); }}
                error={error}
                disabled={busy}
              />
              <Select
                label="카테고리"
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                options={categories.map(c => ({ value: c.id, label: c.label }))}
                disabled={busy}
              />
              <div className="flex items-end">
                <Button type="submit" size="lg" className="w-full" disabled={busy}>
                  {busy ? '추가 중...' : '＋ 추가'}
                </Button>
              </div>
            </form>
          </Card>

          <Card className="p-5">
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-semibold text-gray-900">보유 재료 <span className="text-gray-500">({ingredients.length})</span></h2>
              <div className="flex gap-2">
                <Link to="/recipes">
                  <Button variant="success" size="sm" disabled={ingredients.length === 0}>
                    🔍 레시피 추천 받기
                  </Button>
                </Link>
                {ingredients.length > 0 && (
                  <Button variant="ghost" size="sm" onClick={clearAll}>전체 비우기</Button>
                )}
              </div>
            </div>

            {ingredients.length === 0 ? (
              <Empty
                icon="🥕"
                title="아직 등록된 재료가 없어요"
                description="위에서 재료를 추가해 보세요."
              />
            ) : (
              <div className="space-y-4">
                {categories.map(c => grouped[c.id]?.length > 0 && (
                  <div key={c.id}>
                    <Badge className={`${c.color} mb-2`}>{c.label}</Badge>
                    <div className="flex flex-wrap gap-2">
                      {grouped[c.id].map(i => (
                        <span
                          key={i.id}
                          className="group inline-flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-full pl-3 pr-1.5 py-1 text-sm"
                        >
                          {i.name}
                          <button
                            onClick={() => removeIngredient(i.id)}
                            aria-label={`${i.name} 제거`}
                            className="w-5 h-5 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full"
                          >×</button>
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          <Card className="p-5 bg-amber-50/60 border-amber-200">
            <h3 className="font-semibold text-amber-900 mb-1">💡 빠른 시작</h3>
            <p className="text-sm text-amber-800 mb-3">자주 쓰는 재료를 한 번에 추가해 보세요.</p>
            <div className="flex flex-wrap gap-2">
              {['계란', '밥', '김치', '파', '양파', '마늘', '간장', '참기름'].map(quick => (
                <button
                  key={quick}
                  onClick={() => onQuickAdd(quick)}
                  className="px-3 py-1 bg-white border border-amber-300 hover:bg-amber-100 rounded-full text-xs text-amber-900"
                >＋ {quick}</button>
              ))}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 📄 페이지: 레시피 추천 목록
    // ========================================
    function RecipesPage({ recipes, ingredients }) {
      const [filter, setFilter] = useState('all');
      const matches = useMemo(() => computeRecipeMatches(recipes, ingredients), [recipes, ingredients]);

      const filtered = useMemo(() => {
        if (filter === 'possible') return matches.filter(r => r.missing.length === 0);
        if (filter === 'almost')   return matches.filter(r => r.missing.length > 0 && r.missing.length <= 2);
        return matches;
      }, [matches, filter]);

      const possibleCount = matches.filter(r => r.missing.length === 0).length;
      const almostCount   = matches.filter(r => r.missing.length > 0 && r.missing.length <= 2).length;

      return (
        <div className="space-y-6">
          <section className="flex items-end justify-between flex-wrap gap-3">
            <div>
              <h1 className="text-2xl font-bold text-gray-900 mb-1">🍳 레시피 추천</h1>
              <p className="text-gray-600 text-sm">
                보유 재료 <span className="font-semibold text-rose-600">{ingredients.length}개</span> 기준 ·
                바로 가능 <span className="font-semibold text-emerald-600">{possibleCount}</span> ·
                거의 가능 <span className="font-semibold text-amber-600">{almostCount}</span>
              </p>
            </div>
            <div className="flex gap-2">
              <Link to="/recipes/new"><Button size="sm">＋ 레시피 추가</Button></Link>
              <Link to="/"><Button variant="secondary" size="sm">← 재료 관리</Button></Link>
            </div>
          </section>

          <div className="flex flex-wrap gap-2">
            {[
              { id: 'all', label: '전체' },
              { id: 'possible', label: `🟢 바로 가능 (${possibleCount})` },
              { id: 'almost', label: `🟡 1~2개만 더 (${almostCount})` },
            ].map(f => (
              <button
                key={f.id}
                onClick={() => setFilter(f.id)}
                className={`px-3 py-1.5 rounded-full text-sm border transition-colors ${
                  filter === f.id
                    ? 'bg-rose-500 text-white border-rose-500'
                    : 'bg-white text-gray-700 border-gray-300 hover:bg-rose-50'
                }`}
              >{f.label}</button>
            ))}
          </div>

          {ingredients.length === 0 ? (
            <Card className="p-6">
              <Empty icon="🥒" title="먼저 냉장고에 재료를 등록해 주세요" description="재료가 있어야 레시피를 추천해 드릴 수 있어요." />
              <div className="text-center mt-4">
                <Link to="/"><Button>재료 등록하러 가기</Button></Link>
              </div>
            </Card>
          ) : filtered.length === 0 ? (
            <Card className="p-6">
              <Empty icon="🤔" title="조건에 맞는 레시피가 없어요" description="필터를 바꿔보거나 재료를 더 추가해 보세요." />
            </Card>
          ) : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map(r => <RecipeCard key={r.id} recipe={r} />)}
            </div>
          )}
        </div>
      );
    }

    function RecipeCard({ recipe }) {
      const ratioColor =
        recipe.percent >= 100 ? 'bg-emerald-500'
        : recipe.percent >= 70 ? 'bg-lime-500'
        : recipe.percent >= 40 ? 'bg-amber-500'
        : 'bg-gray-400';

      return (
        <Link to={`/recipe/${recipe.id}`} className="block group">
          <Card className="h-full p-5 hover:shadow-md hover:-translate-y-0.5 transition-all cursor-pointer">
            <div className="flex items-start justify-between mb-2">
              <div className="text-4xl">{recipe.emoji}</div>
              <Badge className={`${recipe.percent >= 100 ? 'bg-emerald-100 text-emerald-700' : recipe.percent >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-700'}`}>
                {recipe.percent}%
              </Badge>
            </div>
            <h3 className="font-bold text-gray-900 group-hover:text-rose-600 transition-colors">{recipe.name}</h3>
            <p className="text-xs text-gray-500 mt-1">⏱ {recipe.time}분 · {recipe.difficulty}</p>

            <div className="mt-3">
              <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div className={`h-full ${ratioColor} transition-all`} style={{ width: `${recipe.percent}%` }} />
              </div>
              <p className="text-xs text-gray-600 mt-1.5">
                {recipe.matched.length}/{recipe.ingredients.length}개 보유
                {recipe.missing.length > 0 && (
                  <> · 부족: <span className="text-red-500">{recipe.missing.slice(0, 2).join(', ')}{recipe.missing.length > 2 ? ' 외' : ''}</span></>
                )}
              </p>
            </div>
          </Card>
        </Link>
      );
    }

    // ========================================
    // 📄 페이지: 레시피 추가
    // ========================================
    function AddRecipePage({ addRecipe }) {
      const { navigate } = useRouter();
      const [name, setName] = useState('');
      const [emoji, setEmoji] = useState('🍽️');
      const [time, setTime] = useState(15);
      const [difficulty, setDifficulty] = useState('쉬움');
      const [tip, setTip] = useState('');
      const [ingredients, setIngredients] = useState(['']);
      const [steps, setSteps] = useState(['']);
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);

      const updateAt = (setter) => (i, v) =>
        setter(prev => prev.map((x, idx) => (idx === i ? v : x)));
      const addAt    = (setter) => () => setter(prev => [...prev, '']);
      const removeAt = (setter) => (i) =>
        setter(prev => (prev.length <= 1 ? prev : prev.filter((_, idx) => idx !== i)));

      const onSubmit = async (e) => {
        e.preventDefault();
        setError('');

        const cleanIngs = ingredients.map(s => s.trim()).filter(Boolean);
        const cleanSteps = steps.map(s => s.trim()).filter(Boolean);

        if (!name.trim())              { setError('레시피 이름을 입력해 주세요.'); return; }
        if (!Number.isInteger(Number(time)) || Number(time) <= 0) {
          setError('조리 시간을 1 이상의 정수로 입력해 주세요.'); return;
        }
        if (cleanIngs.length === 0)    { setError('재료를 1개 이상 입력해 주세요.'); return; }
        if (cleanSteps.length === 0)   { setError('조리 단계를 1개 이상 입력해 주세요.'); return; }

        setBusy(true);
        try {
          const created = await addRecipe({
            name: name.trim(),
            emoji: emoji.trim() || '🍽️',
            time: Number(time),
            difficulty,
            tip: tip.trim() || null,
            ingredients: cleanIngs,
            steps: cleanSteps,
          });
          navigate(`/recipe/${created.id}`);
        } catch (err) {
          setError(err.message);
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="space-y-5">
          <Link to="/recipes" className="inline-flex items-center text-sm text-gray-600 hover:text-rose-600">← 레시피 목록</Link>

          <section>
            <h1 className="text-2xl font-bold text-gray-900 mb-1">📝 레시피 추가</h1>
            <p className="text-gray-600 text-sm">나만의 요리법을 등록해 다른 재료들과 매칭해 보세요.</p>
          </section>

          <form onSubmit={onSubmit} className="space-y-4">
            <Card className="p-5 grid sm:grid-cols-[1fr_120px] gap-3">
              <Input
                label="레시피 이름"
                placeholder="예: 김치볶음밥"
                value={name}
                onChange={(e) => setName(e.target.value)}
                disabled={busy}
                required
              />
              <Input
                label="이모지"
                placeholder="🍽️"
                value={emoji}
                onChange={(e) => setEmoji(e.target.value)}
                disabled={busy}
                maxLength={4}
              />
            </Card>

            <Card className="p-5 grid sm:grid-cols-2 gap-3">
              <Input
                label="조리 시간 (분)"
                type="number"
                min="1"
                value={time}
                onChange={(e) => setTime(e.target.value)}
                disabled={busy}
                required
              />
              <Select
                label="난이도"
                value={difficulty}
                onChange={(e) => setDifficulty(e.target.value)}
                options={[
                  { value: '쉬움',   label: '쉬움' },
                  { value: '보통',   label: '보통' },
                  { value: '어려움', label: '어려움' },
                ]}
                disabled={busy}
              />
            </Card>

            <Card className="p-5">
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-semibold text-gray-900">📋 재료</h2>
                <Button type="button" size="sm" variant="secondary" onClick={addAt(setIngredients)} disabled={busy}>
                  ＋ 재료 추가
                </Button>
              </div>
              <div className="space-y-2">
                {ingredients.map((ing, i) => (
                  <div key={i} className="flex gap-2">
                    <Input
                      placeholder={`재료 ${i + 1} (예: 김치)`}
                      value={ing}
                      onChange={(e) => updateAt(setIngredients)(i, e.target.value)}
                      disabled={busy}
                    />
                    <Button
                      type="button"
                      variant="ghost"
                      size="sm"
                      onClick={() => removeAt(setIngredients)(i)}
                      disabled={busy || ingredients.length <= 1}
                      aria-label={`재료 ${i + 1} 제거`}
                    >✕</Button>
                  </div>
                ))}
              </div>
            </Card>

            <Card className="p-5">
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-semibold text-gray-900">👨‍🍳 조리 단계</h2>
                <Button type="button" size="sm" variant="secondary" onClick={addAt(setSteps)} disabled={busy}>
                  ＋ 단계 추가
                </Button>
              </div>
              <div className="space-y-2">
                {steps.map((s, i) => (
                  <div key={i} className="flex gap-2 items-start">
                    <span className="flex-shrink-0 w-7 h-7 mt-1 rounded-full bg-rose-500 text-white text-sm font-bold flex items-center justify-center">{i + 1}</span>
                    <textarea
                      value={s}
                      onChange={(e) => updateAt(setSteps)(i, e.target.value)}
                      placeholder={`${i + 1}단계 설명을 적어 주세요.`}
                      disabled={busy}
                      rows={2}
                      className="flex-1 px-3 py-2 border border-gray-300 rounded-lg outline-none focus:border-rose-500 resize-y"
                    />
                    <Button
                      type="button"
                      variant="ghost"
                      size="sm"
                      onClick={() => removeAt(setSteps)(i)}
                      disabled={busy || steps.length <= 1}
                      aria-label={`${i + 1}단계 제거`}
                    >✕</Button>
                  </div>
                ))}
              </div>
            </Card>

            <Card className="p-5">
              <label className="block">
                <span className="block text-sm font-medium text-gray-700 mb-1">💡 Tip (선택)</span>
                <textarea
                  value={tip}
                  onChange={(e) => setTip(e.target.value)}
                  placeholder="요리할 때 도움이 되는 팁을 적어 주세요."
                  disabled={busy}
                  rows={2}
                  className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:border-rose-500 resize-y"
                />
              </label>
            </Card>

            {error && (
              <Card className="p-4 bg-red-50 border-red-200">
                <p className="text-sm text-red-700">⚠️ {error}</p>
              </Card>
            )}

            <div className="flex justify-end gap-2">
              <Link to="/recipes"><Button type="button" variant="secondary" disabled={busy}>취소</Button></Link>
              <Button type="submit" size="lg" disabled={busy}>
                {busy ? '저장 중...' : '레시피 저장'}
              </Button>
            </div>
          </form>
        </div>
      );
    }

    // ========================================
    // 📄 페이지: 레시피 상세
    // ========================================
    function RecipeDetailPage({ params, recipes, ingredients }) {
      const recipe = recipes.find(r => r.id === params.id);
      if (!recipe) return <NotFoundPage />;

      const haveNames = ingredients.map(i => i.name);
      const missing = (recipe.ingredients || []).filter(need => !haveNames.some(have => ingredientMatches(have, need)));

      return (
        <div className="space-y-5">
          <Link to="/recipes" className="inline-flex items-center text-sm text-gray-600 hover:text-rose-600">← 레시피 목록</Link>

          <Card className="p-6">
            <div className="flex items-start gap-4">
              <div className="text-6xl">{recipe.emoji}</div>
              <div className="flex-1">
                <h1 className="text-2xl font-bold text-gray-900">{recipe.name}</h1>
                <div className="flex flex-wrap gap-2 mt-2">
                  <Badge className="bg-rose-100 text-rose-700">⏱ {recipe.time}분</Badge>
                  <Badge className="bg-purple-100 text-purple-700">난이도: {recipe.difficulty}</Badge>
                  <Badge className={`${missing.length === 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                    {missing.length === 0 ? '✓ 바로 만들 수 있어요!' : `${missing.length}개 재료만 더 있으면 OK`}
                  </Badge>
                </div>
              </div>
            </div>
          </Card>

          <Card className="p-6">
            <h2 className="font-semibold text-gray-900 mb-3">📋 재료</h2>
            <div className="grid sm:grid-cols-2 gap-2">
              {(recipe.ingredients || []).map(ing => {
                const have = haveNames.some(h => ingredientMatches(h, ing));
                return (
                  <div
                    key={ing}
                    className={`flex items-center gap-2 px-3 py-2 rounded-lg border ${have ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}
                  >
                    <span className="text-lg">{have ? '✅' : '🛒'}</span>
                    <span className={`text-sm font-medium ${have ? 'text-emerald-800' : 'text-red-700'}`}>{ing}</span>
                    {!have && <span className="ml-auto text-xs text-red-500">필요</span>}
                  </div>
                );
              })}
            </div>
          </Card>

          <Card className="p-6">
            <h2 className="font-semibold text-gray-900 mb-3">👨‍🍳 만드는 법</h2>
            <ol className="space-y-3">
              {(recipe.steps || []).map((s, i) => (
                <li key={i} className="flex gap-3">
                  <span className="flex-shrink-0 w-7 h-7 rounded-full bg-rose-500 text-white text-sm font-bold flex items-center justify-center">{i + 1}</span>
                  <p className="text-gray-700 leading-relaxed">{s}</p>
                </li>
              ))}
            </ol>
          </Card>

          {recipe.tip && (
            <Card className="p-5 bg-amber-50 border-amber-200">
              <p className="text-sm text-amber-900"><span className="font-bold">💡 Tip · </span>{recipe.tip}</p>
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 페이지: 404
    // ========================================
    function NotFoundPage() {
      return (
        <Card className="p-10 text-center">
          <div className="text-6xl mb-3">🍽️</div>
          <h1 className="text-xl font-bold text-gray-900">페이지를 찾을 수 없어요</h1>
          <p className="text-gray-600 mt-1 mb-4">주소를 다시 확인해 주세요.</p>
          <Link to="/"><Button>홈으로</Button></Link>
        </Card>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [categories, setCategories] = useState([]);
      const [recipes, setRecipes] = useState([]);
      const [ingredients, setIngredients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [bootError, setBootError] = useState(null);
      const [toast, setToast] = useState({ message: '', type: 'error' });

      const showError = useCallback((msg) => setToast({ message: msg, type: 'error' }), []);
      const closeToast = useCallback(() => setToast(t => ({ ...t, message: '' })), []);

      useEffect(() => {
        (async () => {
          try {
            const [cats, recs, frg] = await Promise.all([
              api('/categories'),
              api('/recipes'),
              api('/fridge'),
            ]);
            setCategories(cats || []);
            setRecipes(recs || []);
            setIngredients(frg || []);
          } catch (err) {
            setBootError(err.message);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      const addIngredient = useCallback(async ({ name, category }) => {
        try {
          const item = await api('/fridge', {
            method: 'POST',
            body: JSON.stringify({ name, category }),
          });
          setIngredients(prev => [item, ...prev]);
          return item;
        } catch (err) {
          showError(err.message);
          throw err;
        }
      }, [showError]);

      const removeIngredient = useCallback(async (id) => {
        try {
          await api(`/fridge/${id}`, { method: 'DELETE' });
          setIngredients(prev => prev.filter(i => i.id !== id));
        } catch (err) {
          showError(err.message);
        }
      }, [showError]);

      const clearAll = useCallback(async () => {
        if (!window.confirm('정말 모든 재료를 비우시겠어요?')) return;
        try {
          await api('/fridge', { method: 'DELETE' });
          setIngredients([]);
        } catch (err) {
          showError(err.message);
        }
      }, [showError]);

      const addRecipe = useCallback(async (payload) => {
        try {
          const created = await api('/recipes', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          setRecipes(prev => [created, ...prev]);
          setToast({ message: '레시피를 추가했어요!', type: 'success' });
          return created;
        } catch (err) {
          showError(err.message);
          throw err;
        }
      }, [showError]);

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center gap-3">
            <Spinner />
            <p className="text-gray-600 text-sm">냉장고를 여는 중...</p>
          </div>
        );
      }

      if (bootError) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <Card className="p-8 max-w-md text-center">
              <div className="text-5xl mb-3">⚠️</div>
              <h1 className="text-xl font-bold text-gray-900 mb-2">서버 연결 실패</h1>
              <p className="text-sm text-gray-600 mb-4 break-words">{bootError}</p>
              <p className="text-xs text-gray-500 mb-4">
                서버가 실행 중인지, <code className="bg-gray-100 px-1 rounded">.env</code>에
                <code className="bg-gray-100 px-1 rounded ml-1">DATABASE_URL</code>이 올바르게 설정되었는지 확인해 주세요.
              </p>
              <Button onClick={() => window.location.reload()}>다시 시도</Button>
            </Card>
          </div>
        );
      }

      const routes = [
        { path: '/', element: <FridgePage categories={categories} ingredients={ingredients} addIngredient={addIngredient} removeIngredient={removeIngredient} clearAll={clearAll} /> },
        { path: '/recipes', element: <RecipesPage recipes={recipes} ingredients={ingredients} /> },
        { path: '/recipes/new', element: <AddRecipePage addRecipe={addRecipe} /> },
        { path: '/recipe/:id', element: <RecipeDetailPage recipes={recipes} ingredients={ingredients} /> },
      ];

      return (
        <Router>
          <div className="min-h-screen">
            <Header ingredientCount={ingredients.length} />
            <PageContainer>
              <Routes routes={routes} />
            </PageContainer>
            <footer className="text-center text-xs text-gray-500 py-6">
              🧊 냉장고 레시피 · DB와 동기화됨
            </footer>
            <Toast message={toast.message} type={toast.type} onClose={closeToast} />
          </div>
        </Router>
      );
    }

    // ========================================
    // 🌳 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
