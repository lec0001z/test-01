    function Button({ variant = 'primary', size = 'md', disabled, onClick, className = '', children, type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-full transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-stone-800 text-stone-50 hover:bg-stone-900 focus:ring-stone-700',
        secondary: 'bg-stone-100 text-stone-800 hover:bg-stone-200 focus:ring-stone-300',
        outline: 'border border-stone-300 text-stone-800 hover:bg-stone-100 focus:ring-stone-300',
        ghost: 'text-stone-700 hover:bg-stone-100 focus:ring-stone-300',
        danger: 'bg-red-700 text-white hover:bg-red-800 focus:ring-red-500',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-sm',
        lg: 'px-7 py-3.5 text-base',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function IconButton({ onClick, ariaLabel, className = '', children }) {
      return (
        <button onClick={onClick} aria-label={ariaLabel}
          className={`relative inline-flex items-center justify-center w-10 h-10 rounded-full text-stone-700 hover:bg-stone-100 transition ${className}`}>

    function Badge({ children, variant = 'default', className = '' }) {

      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>

    function Card({ children, className = '', onClick }) {

    function Modal({ isOpen, onClose, title, children, size = 'lg' }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => e.key === 'Escape' && onClose();
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      const sizes = { sm: 'max-w-md', md: 'max-w-2xl', lg: 'max-w-4xl', xl: 'max-w-6xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade" onClick={onClose}>
          <div className="absolute inset-0 bg-stone-900/50 backdrop-blur-sm"></div>
          <div onClick={(e) => e.stopPropagation()}
            className={`relative bg-white rounded-3xl shadow-2xl w-full ${sizes[size]} max-h-[90vh] overflow-hidden animate-scale`}>

    // ========================================
    // 🛒 Cart Context
    // ========================================

    const CartContext = createContext(null);

    function CartProvider({ children }) {
      const [items, setItems] = useState(() => {
        try { return JSON.parse(sessionStorage.getItem('dodam_cart') || '[]'); }
        catch { return []; }
      });
      const [drawerOpen, setDrawerOpen] = useState(false);

      useEffect(() => {
        sessionStorage.setItem('dodam_cart', JSON.stringify(items));
      }, [items]);

      const add = (product, qty = 1) => {
        setItems(prev => {
          const exist = prev.find(i => i.id === product.id);
          if (exist) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + qty } : i);
          return [...prev, { ...product, qty }];
        });
        setDrawerOpen(true);
      };
      const remove = (id) => setItems(prev => prev.filter(i => i.id !== id));
      const updateQty = (id, qty) => setItems(prev => prev.map(i => i.id === id ? { ...i, qty: Math.max(1, qty) } : i));
      const clear = () => setItems([]);
      const count = items.reduce((sum, i) => sum + i.qty, 0);
      const total = items.reduce((sum, i) => sum + i.price * i.qty, 0);

      return (
        <CartContext.Provider value={{ items, add, remove, updateQty, clear, count, total, drawerOpen, setDrawerOpen }}>
          {children}
        </CartContext.Provider>
      );
    }

    const useCart = () => useContext(CartContext);

    // ========================================
    // 💳 CheckoutPage — Toss 결제 위젯 통합
    // ========================================
    function CheckoutPage() {
      const { items, total } = useCart();
      const [config, setConfig] = useState(null);
      const [customer, setCustomer] = useState({ name: '', email: '', phone: '' });
      const [ready, setReady] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const widgetsRef = useRef(null);
      const renderedRef = useRef(false);

      const shipping = items.length === 0 ? 0 : (total >= 50000 ? 0 : 3000);
      const finalAmount = total + shipping;

      // 1) 클라이언트 키 가져오기
      useEffect(() => {
        fetch('/api/config').then(r => r.json()).then(setConfig).catch(console.error);
      }, []);

      // 2) Toss 위젯 인스턴스 생성 (한 번만)
      useEffect(() => {
        if (!config || !window.TossPayments || items.length === 0) return;
        const tossPayments = window.TossPayments(config.clientKey);
        widgetsRef.current = tossPayments.widgets({
          customerKey: window.TossPayments.ANONYMOUS,
        });
      }, [config, items.length]);

      // 3) 금액 설정 + 위젯 렌더 (렌더는 단 1회, 금액 변경은 setAmount만)
      useEffect(() => {
        const render = async () => {
          if (!widgetsRef.current || finalAmount === 0) return;
          await widgetsRef.current.setAmount({ currency: 'KRW', value: finalAmount });
          if (!renderedRef.current) {
            await widgetsRef.current.renderPaymentMethods({
              selector: '#payment-method',
              variantKey: 'DEFAULT',
            });
            await widgetsRef.current.renderAgreement({
              selector: '#agreement',
              variantKey: 'AGREEMENT',
            });
            renderedRef.current = true;
            setReady(true);
          }
        };
        render().catch(console.error);
      }, [config, finalAmount]);

      const handlePay = async () => {
        if (!widgetsRef.current || submitting) return;
        if (!customer.name.trim() || !customer.email.trim() || !customer.phone.trim()) {
          alert('받는 분 정보를 모두 입력해주세요.');
          return;
        }
        setSubmitting(true);

        const orderId = generateOrderId();
        const orderName = items.length === 1
          ? items[0].name
          : `${items[0].name} 외 ${items.length - 1}건`;

        try {
          // 서버에 주문 정보 미리 저장 (confirm 시 금액 위변조 검증용)
          const prep = await fetch('/api/payments/prepare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              orderId,
              amount: finalAmount,
              orderName,
              items: items.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
            }),
          });
          if (!prep.ok) throw new Error('주문 준비에 실패했습니다.');

          await widgetsRef.current.requestPayment({
            orderId,
            orderName,
            successUrl: window.location.origin + '/payments/success',
            failUrl: window.location.origin + '/payments/fail',
            customerEmail: customer.email,
            customerName: customer.name,
            customerMobilePhone: customer.phone.replace(/-/g, ''),
          });
          // requestPayment 호출 후 토스로 redirect되므로 이후 코드는 일반적으로 실행되지 않음
        } catch (err) {
          if (err && err.code !== 'USER_CANCEL') {
            alert((err && err.message) || '결제 요청 중 오류가 발생했습니다.');
          }
          setSubmitting(false);
        }
      };

      if (items.length === 0) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-stone-50">
            <div className="text-center">
              <p className="text-stone-600 mb-4">장바구니가 비어있어요</p>
              <Button onClick={() => navigate('/')}>쇼핑하러 가기</Button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50">
          <SimpleHeader title="주문 / 결제" />
          <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <h1 className="text-2xl lg:text-3xl font-bold text-stone-900 mb-8">결제하기</h1>
            <div className="grid lg:grid-cols-5 gap-6">
              {/* 왼쪽: 고객정보 + 결제수단 위젯 */}
              <section className="lg:col-span-3 space-y-6">
                <Card className="p-6 shadow-sm">
                  <h3 className="font-semibold mb-4">받는 분 정보</h3>
                  <div className="space-y-3">
                    <input value={customer.name}
                      onChange={(e) => setCustomer({ ...customer, name: e.target.value })}
                      placeholder="이름"
                      className="w-full px-4 py-3 text-sm bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-stone-400 transition" />
                    <input type="email" value={customer.email}
                      onChange={(e) => setCustomer({ ...customer, email: e.target.value })}
                      placeholder="이메일"
                      className="w-full px-4 py-3 text-sm bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-stone-400 transition" />
                    <input type="tel" value={customer.phone}
                      onChange={(e) => setCustomer({ ...customer, phone: e.target.value })}
                      placeholder="휴대폰 번호 (예: 01012345678)"
                      className="w-full px-4 py-3 text-sm bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-stone-400 transition" />
                  </div>
                </Card>

                <Card className="p-6 shadow-sm">
                  <h3 className="font-semibold mb-4">결제수단</h3>
                  <div id="payment-method"></div>
                  <div id="agreement" className="mt-2"></div>
                  <Button size="lg" disabled={!ready || submitting} onClick={handlePay}
                    className="w-full mt-6">
                    {submitting ? '결제 진행 중...' : `${finalAmount.toLocaleString()}원 결제하기`}
                  </Button>
                  <p className="mt-3 text-xs text-stone-400 text-center">
                    ⚠️ 테스트 환경입니다. 실제 결제는 발생하지 않습니다.
                  </p>
                </Card>
              </section>

              {/* 오른쪽: 주문 요약 */}
              <aside className="lg:col-span-2">
                <Card className="p-6 shadow-sm lg:sticky lg:top-6">
                  <h3 className="font-semibold mb-4">주문 상품 ({items.length})</h3>
                  <div className="space-y-3 max-h-72 overflow-y-auto pr-1">
                    {items.map(item => (
                      <div key={item.id} className="flex gap-3 text-sm">
                        <div className={`w-14 h-14 ${item.grad} rounded-lg flex items-center justify-center flex-shrink-0`}>
                          <PotteryIllustration shape={item.shape} className="w-full" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-xs text-stone-500">{item.artist}</p>
                          <p className="font-medium truncate">{item.name}</p>
                          <p className="text-stone-500 text-xs">수량 {item.qty}</p>
                        </div>
                        <div className="text-right font-medium whitespace-nowrap">
                          {(item.price * item.qty).toLocaleString()}원
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-5 pt-5 border-t border-stone-100 space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-stone-500">상품 금액</span>
                      <span>{total.toLocaleString()}원</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-stone-500">배송비</span>
                      <span>{shipping === 0 ? '무료' : `${shipping.toLocaleString()}원`}</span>
                    </div>
                    <div className="flex justify-between pt-3 border-t border-stone-100">
                      <span className="font-semibold">총 결제금액</span>
                      <span className="text-xl font-bold">{finalAmount.toLocaleString()}원</span>
                    </div>
                  </div>
                </Card>
              </aside>
            </div>
          </main>
        </div>
      );
    }

    // ========================================
    // ✅ SuccessPage — 결제 승인 처리
    // ========================================
    function SuccessPage() {
      const { clear } = useCart();
      const [state, setState] = useState({ status: 'loading' });
      const ranRef = useRef(false);

      useEffect(() => {
        if (ranRef.current) return;  // StrictMode/HMR 중복 호출 방지
        ranRef.current = true;

        const params = new URLSearchParams(window.location.search);
        const paymentKey = params.get('paymentKey');
        const orderId = params.get('orderId');
        const amount = Number(params.get('amount'));

        if (!paymentKey || !orderId || !amount) {
          setState({ status: 'error', message: '결제 정보가 올바르지 않습니다.' });
          return;
        }

        fetch('/api/payments/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentKey, orderId, amount }),
        })
          .then(async (res) => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || data.error || '결제 승인 실패');
            return data;
          })
          .then((data) => {
            clear();
            // URL 정리: 새로고침 시 재confirm 방지 + 민감 파라미터 노출 시간 최소화
            window.history.replaceState({}, '', '/payments/success');
            setState({ status: 'success', data, orderId });
          })
          .catch((err) => setState({ status: 'error', message: err.message }));
      }, []);

      if (state.status === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-stone-50">
            <div className="text-center">
              <div className="w-12 h-12 border-4 border-stone-200 border-t-stone-700 rounded-full animate-spin mx-auto"></div>
              <p className="mt-4 text-stone-600">결제를 확인하고 있어요...</p>
            </div>
          </div>
        );
      }

      if (state.status === 'error') {
        return (
          <div className="min-h-screen bg-stone-50">
            <SimpleHeader title="결제 오류" />
            <main className="max-w-2xl mx-auto px-4 py-12">
              <Card className="p-10 text-center shadow-sm">
                <div className="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
                  <svg className="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </div>
                <h2 className="text-xl font-bold">결제 승인에 실패했어요</h2>
                <p className="mt-2 text-stone-500 text-sm">{state.message}</p>
                <Button className="mt-6" onClick={() => navigate('/')}>홈으로 돌아가기</Button>
              </Card>
            </main>
          </div>
        );
      }

      const { data } = state;
      return (
        <div className="min-h-screen bg-stone-50">
          <SimpleHeader title="결제 완료" />
          <main className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <Card className="p-10 text-center shadow-sm">
              <div className="w-20 h-20 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-5">
                <svg className="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold">주문이 완료되었어요</h1>
              <p className="mt-2 text-stone-500">소중한 그릇을 정성껏 포장해서 보내드릴게요</p>

              <div className="mt-8 p-5 bg-stone-50 rounded-2xl text-left text-sm space-y-2">
                <div className="flex justify-between gap-3">
                  <span className="text-stone-500">주문번호</span>
                  <span className="font-mono text-xs break-all">{state.orderId}</span>
                </div>
                <div className="flex justify-between gap-3">
                  <span className="text-stone-500">주문상품</span>
                  <span className="text-right">{data.orderName}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-stone-500">결제수단</span>
                  <span>{data.payment.method || '—'}</span>
                </div>
                <div className="flex justify-between pt-3 border-t border-stone-200">
                  <span className="text-stone-500">결제금액</span>
                  <span className="font-bold text-base">{data.payment.totalAmount.toLocaleString()}원</span>
                </div>
              </div>

              <div className="mt-6 flex gap-3">
                {data.payment.receiptUrl && (
                  <Button variant="outline" size="lg" className="flex-1"
                    onClick={() => window.open(data.payment.receiptUrl, '_blank')}>
                    영수증 보기
                  </Button>
                )}
                <Button size="lg" className="flex-1" onClick={() => navigate('/')}>
                  쇼핑 계속하기
                </Button>
              </div>
            </Card>
          </main>
        </div>
      );
    }

    // ========================================
    // ❌ FailPage — 결제 실패 안내
    // ========================================
    function FailPage() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const message = params.get('message');
      const orderId = params.get('orderId');

      return (
        <div className="min-h-screen bg-stone-50">
          <SimpleHeader title="결제 실패" />
          <main className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <Card className="p-10 text-center shadow-sm">
              <div className="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-5">
                <svg className="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                    d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold">결제에 실패했어요</h1>
              <p className="mt-2 text-stone-500 text-sm">
                {message || '알 수 없는 오류가 발생했습니다.'}
              </p>

              {(code || orderId) && (
                <div className="mt-6 p-4 bg-stone-50 rounded-xl text-xs text-stone-500 text-left space-y-1">
                  {code && <div>오류 코드: <span className="font-mono">{code}</span></div>}
                  {orderId && <div>주문번호: <span className="font-mono break-all">{orderId}</span></div>}
                </div>
              )}

              <div className="mt-6 flex gap-3">
                <Button variant="outline" size="lg" className="flex-1" onClick={() => navigate('/checkout')}>
                  다시 시도
                </Button>
                <Button size="lg" className="flex-1" onClick={() => navigate('/')}>
                  홈으로
                </Button>
              </div>
            </Card>
          </main>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const route = window.location.pathname;
      let page;
      if (route === '/checkout') page = <CheckoutPage />;
      else if (route === '/payments/success') page = <SuccessPage />;
      else if (route === '/payments/fail') page = <FailPage />;
      else page = <HomePage />;

      return <CartProvider>{page}</CartProvider>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
