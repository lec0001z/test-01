<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 별명 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes sparkle {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.2) rotate(10deg); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-border {
      0%, 100% { border-color: #8b5cf6; }
      50% { border-color: #ec4899; }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
    .animate-sparkle {
      animation: sparkle 0.6s ease-in-out;
    }
    .animate-pulse-border {
      animation: pulse-border 2s ease-in-out infinite;
    }
    .nickname-card:hover {
      transform: translateY(-4px) scale(1.02);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-violet-50 via-pink-50 to-amber-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    const getApiKey = () => localStorage.getItem("openai_api_key") || "";

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const baseClasses = "font-semibold rounded-xl transition-all duration-300 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-gradient-to-r from-violet-500 to-pink-500 text-white hover:from-violet-600 hover:to-pink-600 shadow-lg hover:shadow-xl",
        secondary: "bg-white text-violet-600 border-2 border-violet-300 hover:border-violet-500 hover:bg-violet-50",
        ghost: "bg-transparent text-violet-500 hover:bg-violet-100",
        success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-2.5 text-base",
        lg: "px-8 py-3.5 text-lg",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${baseClasses} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, type = "text", className = "" }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-violet-400 focus:outline-none transition-colors bg-white/80 backdrop-blur-sm"
          />
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 3, className = "" }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}</label>}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-violet-400 focus:outline-none transition-colors bg-white/80 backdrop-blur-sm resize-none"
          />
        </div>
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-6 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧩 Nickname Card Component
    // ========================================

    function NicknameCard({ nickname, emoji, reason, index }) {
      const [copied, setCopied] = useState(false);
      const [sparkle, setSparkle] = useState(false);

      const handleCopy = useCallback(async () => {
        try {
          await navigator.clipboard.writeText(nickname);
          setCopied(true);
          setSparkle(true);
          setTimeout(() => setCopied(false), 2000);
          setTimeout(() => setSparkle(false), 600);
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = nickname;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      }, [nickname]);

      const colors = [
        "from-violet-400 to-purple-500",
        "from-pink-400 to-rose-500",
        "from-amber-400 to-orange-500",
        "from-emerald-400 to-teal-500",
        "from-blue-400 to-indigo-500",
        "from-cyan-400 to-sky-500",
      ];

      return (
        <div
          className="animate-fade-in-up"
          style={{ animationDelay: `${index * 0.1}s`, opacity: 0 }}
        >
          <div className="nickname-card bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden cursor-pointer border-2 border-transparent hover:border-violet-200">
            <div className={`h-2 bg-gradient-to-r ${colors[index % colors.length]}`} />
            <div className="p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                  <span className={`text-3xl ${sparkle ? "animate-sparkle" : ""}`}>{emoji}</span>
                  <h3 className="text-xl font-bold text-gray-800">{nickname}</h3>
                </div>
                <button
                  onClick={handleCopy}
                  className={`p-2 rounded-lg transition-all duration-300 ${
                    copied
                      ? "bg-emerald-100 text-emerald-600"
                      : "bg-gray-100 text-gray-500 hover:bg-violet-100 hover:text-violet-600"
                  }`}
                  title="별명 복사하기"
                >
                  {copied ? (
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                  ) : (
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                  )}
                </button>
              </div>
              <p className="text-sm text-gray-500 leading-relaxed">{reason}</p>
              {copied && (
                <div className="mt-2 text-xs text-emerald-500 font-medium animate-fade-in-up">
                  ✅ 클립보드에 복사되었습니다!
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔄 Loading Spinner
    // ========================================

    function LoadingSpinner() {
      const emojis = ["🎭", "🎨", "✨", "🌟", "💫", "🎪"];
      const [emojiIndex, setEmojiIndex] = useState(0);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setEmojiIndex((prev) => (prev + 1) % emojis.length);
        }, 500);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="flex flex-col items-center gap-4 py-12">
          <div className="text-5xl animate-bounce">{emojis[emojiIndex]}</div>
          <div className="flex items-center gap-2">
            <div className="w-2 h-2 bg-violet-500 rounded-full animate-bounce" style={{ animationDelay: "0s" }} />
            <div className="w-2 h-2 bg-pink-500 rounded-full animate-bounce" style={{ animationDelay: "0.1s" }} />
            <div className="w-2 h-2 bg-amber-500 rounded-full animate-bounce" style={{ animationDelay: "0.2s" }} />
          </div>
          <p className="text-gray-500 font-medium">AI가 별명을 만들고 있어요...</p>
        </div>
      );
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [apiKey, setApiKey] = useState(getApiKey());
      const [name, setName] = useState("");
      const [personality, setPersonality] = useState("");
      const [hobbies, setHobbies] = useState("");
      const [extra, setExtra] = useState("");
      const [nicknames, setNicknames] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [generated, setGenerated] = useState(false);

      const handleApiKeyChange = (e) => {
        const key = e.target.value;
        setApiKey(key);
        localStorage.setItem("openai_api_key", key);
      };

      const generateNicknames = useCallback(async () => {
        if (!apiKey.trim()) {
          setError("OpenAI API 키를 입력해주세요!");
          return;
        }
        if (!name.trim()) {
          setError("이름을 입력해주세요!");
          return;
        }

        setLoading(true);
        setError(null);
        setNicknames([]);

        const prompt = `당신은 재미있고 창의적인 별명을 만드는 전문가입니다.

다음 사람의 정보를 바탕으로 재미있고 독특한 별명을 6개 만들어주세요.

이름: ${name}
${personality ? `성격: ${personality}` : ""}
${hobbies ? `취미: ${hobbies}` : ""}
${extra ? `추가 정보: ${extra}` : ""}

규칙:
- 별명은 한국어로 만들어주세요
- 재미있고 긍정적인 별명으로 만들어주세요
- 각 별명에 어울리는 이모지 1개를 골라주세요
- 왜 그 별명을 지었는지 짧게 설명해주세요
- 다양한 스타일(귀여운, 웃긴, 멋진, 독특한 등)을 섞어주세요

반드시 아래 JSON 배열 형식으로만 답해주세요. 다른 텍스트 없이 JSON만 출력하세요:
[
  {"nickname": "별명1", "emoji": "🎭", "reason": "이유 설명"},
  {"nickname": "별명2", "emoji": "🌟", "reason": "이유 설명"}
]`;

        try {
          const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              model: "gpt-4o-mini",
              messages: [{ role: "user", content: prompt }],
              temperature: 1.0,
              max_tokens: 1000,
            }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || `API 오류 (${response.status})`);
          }

          const data = await response.json();
          const content = data.choices[0].message.content.trim();

          // JSON 파싱 - 코드블록 감싸진 경우 처리
          const jsonStr = content.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
          const parsed = JSON.parse(jsonStr);

          if (Array.isArray(parsed) && parsed.length > 0) {
            setNicknames(parsed);
            setGenerated(true);
          } else {
            throw new Error("별명을 생성하지 못했습니다.");
          }
        } catch (err) {
          setError(err.message || "별명 생성 중 오류가 발생했습니다.");
        } finally {
          setLoading(false);
        }
      }, [name, personality, hobbies, extra]);

      const handleReset = useCallback(() => {
        setNicknames([]);
        setGenerated(false);
        setError(null);
      }, []);

      return (
        <div className="min-h-screen py-8 px-4">
          <div className="max-w-2xl mx-auto">
            {/* Header */}
            <div className="text-center mb-8">
              <h1 className="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-violet-600 via-pink-500 to-amber-500 bg-clip-text text-transparent mb-3">
                AI 별명 생성기
              </h1>
              <p className="text-gray-500 text-lg">
                당신의 정보를 알려주세요, AI가 재미있는 별명을 만들어드려요! ✨
              </p>
            </div>

            {/* Input Form */}
            <Card className="mb-8 animate-pulse-border border-2">
              <div className="space-y-4">
                <Input
                  label="🔑 OpenAI API Key"
                  type="password"
                  value={apiKey}
                  onChange={handleApiKeyChange}
                  placeholder="sk-proj-..."
                />
                <hr className="border-gray-200" />
                <Input
                  label="📛 이름 (필수)"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="예: 홍길동"
                />
                <Input
                  label="😄 성격"
                  value={personality}
                  onChange={(e) => setPersonality(e.target.value)}
                  placeholder="예: 활발하고 유머러스한, 조용하지만 다정한"
                />
                <Input
                  label="🎯 취미"
                  value={hobbies}
                  onChange={(e) => setHobbies(e.target.value)}
                  placeholder="예: 게임, 요리, 등산, 독서"
                />
                <Textarea
                  label="💬 추가 정보 (선택)"
                  value={extra}
                  onChange={(e) => setExtra(e.target.value)}
                  placeholder="예: 고양이를 좋아해요, 항상 지각해요, 커피 중독"
                  rows={2}
                />

                <div className="flex gap-3 pt-2">
                  <Button
                    onClick={generateNicknames}
                    disabled={loading}
                    size="lg"
                    className="flex-1"
                  >
                    {loading ? "생성 중..." : "🎲 별명 만들기"}
                  </Button>
                  {generated && (
                    <Button onClick={handleReset} variant="secondary" size="lg">
                      🔄 다시
                    </Button>
                  )}
                </div>
              </div>
            </Card>

            {/* Error */}
            {error && (
              <div className="mb-6 p-4 bg-red-50 border-2 border-red-200 rounded-xl text-red-600 text-center animate-fade-in-up">
                ⚠️ {error}
              </div>
            )}

            {/* Loading */}
            {loading && (
              <Card className="mb-8">
                <LoadingSpinner />
              </Card>
            )}

            {/* Results */}
            {nicknames.length > 0 && (
              <div>
                <h2 className="text-2xl font-bold text-gray-800 mb-4 text-center">
                  🎉 <span className="text-violet-600">{name}</span>님의 별명 추천
                </h2>
                <p className="text-center text-gray-400 text-sm mb-6">
                  마음에 드는 별명의 복사 버튼을 클릭하세요!
                </p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {nicknames.map((item, index) => (
                    <NicknameCard
                      key={index}
                      nickname={item.nickname}
                      emoji={item.emoji}
                      reason={item.reason}
                      index={index}
                    />
                  ))}
                </div>
                <div className="text-center mt-8">
                  <Button onClick={generateNicknames} disabled={loading} variant="secondary" size="md">
                    🎲 다른 별명 받기
                  </Button>
                </div>
              </div>
            )}

            {/* Footer */}
            <div className="text-center mt-12 text-gray-400 text-sm">
              Powered by OpenAI GPT-4o-mini ⚡
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
