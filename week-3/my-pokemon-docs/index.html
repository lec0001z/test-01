<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 도감</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ========================================
    // 📡 API
    // ========================================

    const API_BASE_URL = '/api';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-md p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ value, onChange, placeholder, className = "" }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className={`w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent text-lg ${className}`}
        />
      );
    }

    function Badge({ children, className = "" }) {
      return (
        <span className={`inline-block px-3 py-1 rounded-full text-sm font-medium ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 📊 스탯 바 컴포넌트
    // ========================================

    function StatBar({ label, value, max = 160 }) {
      const percent = Math.min((value / max) * 100, 100);
      const barColor =
        value >= 100 ? "bg-green-500" :
        value >= 70 ? "bg-yellow-400" :
        value >= 40 ? "bg-orange-400" : "bg-red-400";

      return (
        <div className="flex items-center gap-2 text-sm">
          <span className="w-16 text-gray-500 font-medium">{label}</span>
          <span className="w-8 text-right font-bold text-gray-700">{value}</span>
          <div className="flex-1 bg-gray-200 rounded-full h-2.5">
            <div
              className={`h-2.5 rounded-full ${barColor} transition-all duration-500`}
              style={{ width: `${percent}%` }}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // 🃏 포켓몬 카드 컴포넌트
    // ========================================

    function PokemonCard({ pokemon }) {
      const [imgLoaded, setImgLoaded] = useState(false);

      return (
        <Card className="hover:shadow-xl transition-shadow duration-300">
          <div className="flex flex-col items-center">
            <span className="text-xs text-gray-400 font-mono self-start">
              #{String(pokemon.id).padStart(3, "0")}
            </span>
            <div className="w-40 h-40 flex items-center justify-center mb-3">
              {!imgLoaded && (
                <div className="w-20 h-20 border-4 border-gray-200 border-t-blue-400 rounded-full animate-spin" />
              )}
              <img
                src={pokemon.image}
                alt={pokemon.name}
                className={`w-40 h-40 object-contain drop-shadow-lg transition-opacity duration-300 ${imgLoaded ? "opacity-100" : "opacity-0 absolute"}`}
                onLoad={() => setImgLoaded(true)}
              />
            </div>
            <h2 className="text-xl font-bold text-gray-800">{pokemon.name}</h2>
            <p className="text-sm text-gray-400 mb-2">{pokemon.nameEn}</p>
            <div className="flex gap-2 mb-4">
              {pokemon.types.map((type, i) => (
                <Badge key={type} className={pokemon.typeColors[i]}>
                  {type}
                </Badge>
              ))}
            </div>
            <p className="text-sm text-gray-600 text-center mb-4 leading-relaxed">
              {pokemon.description}
            </p>
            <div className="w-full space-y-1.5">
              <StatBar label="HP" value={pokemon.stats.hp} />
              <StatBar label="공격" value={pokemon.stats.attack} />
              <StatBar label="방어" value={pokemon.stats.defense} />
              <StatBar label="스피드" value={pokemon.stats.speed} />
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [search, setSearch] = useState("");
      const [pokemons, setPokemons] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        const q = search.trim();
        const url = q
          ? `${API_BASE_URL}/pokemons?q=${encodeURIComponent(q)}`
          : `${API_BASE_URL}/pokemons`;

        setLoading(true);
        fetch(url)
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setPokemons(json.data);
            else setError(json.message);
          })
          .catch(() => setError("서버 연결에 실패했습니다"))
          .finally(() => setLoading(false));
      }, [search]);

      const filtered = pokemons;

      return (
        <div className="max-w-5xl mx-auto px-4 py-10">
          <header className="text-center mb-10">
            <h1 className="text-4xl font-extrabold text-gray-800 mb-2">
              포켓몬 도감
            </h1>
            <p className="text-gray-500 mb-6">이름, 영문명, 타입으로 검색하세요</p>
            <div className="max-w-md mx-auto">
              <Input
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="🔍 포켓몬 검색..."
              />
            </div>
          </header>

          {error ? (
            <div className="text-center py-20">
              <p className="text-6xl mb-4">⚠️</p>
              <p className="text-red-500 text-lg">{error}</p>
            </div>
          ) : loading ? (
            <div className="text-center py-20">
              <div className="w-16 h-16 border-4 border-gray-200 border-t-blue-400 rounded-full animate-spin mx-auto mb-4" />
              <p className="text-gray-500">로딩 중...</p>
            </div>
          ) : filtered.length === 0 ? (
            <div className="text-center py-20">
              <p className="text-6xl mb-4">😢</p>
              <p className="text-gray-500 text-lg">검색 결과가 없습니다</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {filtered.map((p) => (
                <PokemonCard key={p.id} pokemon={p} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🎬 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
