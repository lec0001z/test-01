<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Server — API 테스터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ========================================
    // ⚙️  Config
    // ========================================
    // 상대 경로 기반 — 같은 오리진에 서버가 붙어있을 때 동작
    const DEFAULT_BASE_URL = window.location.origin;
    const DEFAULT_ENDPOINT = '/api/hello';

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', className = '', children }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-500',
        secondary: 'bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 focus:ring-slate-400',
        danger: 'bg-rose-600 hover:bg-rose-700 text-white focus:ring-rose-500',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-700 focus:ring-slate-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-5 py-2.5 text-base',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>}
          <input
            {...props}
            className={`w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 ${error ? 'border-rose-400' : 'border-slate-300'}`}
          />
          {error && <span className="block text-xs text-rose-600 mt-1">{error}</span>}
        </label>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>}
          <select value={value} onChange={onChange}
            className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
          </select>
        </label>
      );
    }

    function Textarea({ label, rows = 6, className = '', ...props }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>}
          <textarea
            rows={rows}
            {...props}
            className="w-full px-3 py-2 text-sm font-mono border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"
          />
        </label>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ variant = 'default', children }) {
      const styles = {
        default: 'bg-slate-100 text-slate-700',
        success: 'bg-emerald-100 text-emerald-700',
        warning: 'bg-amber-100 text-amber-700',
        error: 'bg-rose-100 text-rose-700',
        info: 'bg-sky-100 text-sky-700',
      };
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold ${styles[variant]}`}>
          {children}
        </span>
      );
    }

    function statusVariant(status) {
      if (!status) return 'default';
      if (status >= 200 && status < 300) return 'success';
      if (status >= 300 && status < 400) return 'info';
      if (status >= 400 && status < 500) return 'warning';
      return 'error';
    }

    // ========================================
    // 🧩 Layout Components
    // ========================================
    function Header() {
      return (
        <header className="bg-white border-b border-slate-200">
          <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold text-slate-800">🌐 Hello Server</h1>
              <p className="text-xs text-slate-500 mt-0.5">간단한 서버 API 호출 테스트 도구</p>
            </div>
            <Badge variant="info">React + Tailwind</Badge>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 API Tester Page
    // ========================================
    function ApiTesterPage() {
      const [method, setMethod] = useState('GET');
      const [baseUrl, setBaseUrl] = useState(DEFAULT_BASE_URL);
      const [endpoint, setEndpoint] = useState(DEFAULT_ENDPOINT);
      const [headersText, setHeadersText] = useState('{\n  "Content-Type": "application/json"\n}');
      const [bodyText, setBodyText] = useState('{\n  "name": "world"\n}');
      const [loading, setLoading] = useState(false);
      const [response, setResponse] = useState(null);
      const [error, setError] = useState(null);
      const [history, setHistory] = useState([]);
      const [elapsed, setElapsed] = useState(null);

      const hasBody = method === 'POST' || method === 'PUT' || method === 'PATCH';
      const fullUrl = useMemo(() => {
        try {
          if (!endpoint) return baseUrl;
          if (/^https?:\/\//i.test(endpoint)) return endpoint;
          return baseUrl.replace(/\/$/, '') + (endpoint.startsWith('/') ? endpoint : '/' + endpoint);
        } catch { return endpoint; }
      }, [baseUrl, endpoint]);

      function parseHeaders() {
        if (!headersText.trim()) return {};
        try { return JSON.parse(headersText); }
        catch (e) { throw new Error('헤더 JSON 파싱 실패: ' + e.message); }
      }

      async function sendRequest() {
        setLoading(true);
        setError(null);
        setResponse(null);
        setElapsed(null);

        const start = performance.now();
        try {
          const headers = parseHeaders();
          const init = { method, headers };
          if (hasBody && bodyText.trim()) {
            init.body = bodyText;
          }

          const res = await fetch(fullUrl, init);
          const took = Math.round(performance.now() - start);

          const contentType = res.headers.get('content-type') || '';
          let bodyData;
          if (contentType.includes('application/json')) {
            try { bodyData = await res.json(); }
            catch { bodyData = await res.text(); }
          } else {
            bodyData = await res.text();
          }

          const respHeaders = {};
          res.headers.forEach((v, k) => { respHeaders[k] = v; });

          const result = {
            ok: res.ok,
            status: res.status,
            statusText: res.statusText,
            headers: respHeaders,
            body: bodyData,
            contentType,
          };
          setResponse(result);
          setElapsed(took);
          setHistory(prev => [{
            id: Date.now(),
            method,
            url: fullUrl,
            status: res.status,
            ok: res.ok,
            took,
            at: new Date().toLocaleTimeString('ko-KR'),
          }, ...prev].slice(0, 10));
        } catch (e) {
          const took = Math.round(performance.now() - start);
          setError(e.message || String(e));
          setElapsed(took);
          setHistory(prev => [{
            id: Date.now(),
            method,
            url: fullUrl,
            status: 0,
            ok: false,
            took,
            at: new Date().toLocaleTimeString('ko-KR'),
            errored: true,
          }, ...prev].slice(0, 10));
        } finally {
          setLoading(false);
        }
      }

      function loadFromHistory(item) {
        setMethod(item.method);
        try {
          const u = new URL(item.url);
          setBaseUrl(u.origin);
          setEndpoint(u.pathname + u.search);
        } catch {
          setEndpoint(item.url);
        }
      }

      function formatBody(body) {
        if (body == null) return '';
        if (typeof body === 'string') return body;
        try { return JSON.stringify(body, null, 2); }
        catch { return String(body); }
      }

      return (
        <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
          {/* Left: Request */}
          <div className="lg:col-span-2 space-y-6">
            <Card className="p-5">
              <h2 className="text-sm font-bold text-slate-700 mb-4">요청 구성</h2>
              <div className="flex flex-col sm:flex-row gap-3">
                <Select
                  label="Method"
                  value={method}
                  onChange={(e) => setMethod(e.target.value)}
                  options={['GET', 'POST', 'PUT', 'PATCH', 'DELETE']}
                  className="sm:w-36"
                />
                <Input
                  label="Base URL"
                  value={baseUrl}
                  onChange={(e) => setBaseUrl(e.target.value)}
                  placeholder="https://example.com"
                  className="flex-1"
                />
              </div>
              <Input
                label="Endpoint"
                value={endpoint}
                onChange={(e) => setEndpoint(e.target.value)}
                placeholder="/api/hello"
                className="mt-3"
              />
              <div className="mt-2 text-xs text-slate-500 break-all">
                <span className="font-semibold text-slate-600">요청 URL: </span>{fullUrl}
              </div>

              <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                <Textarea
                  label="Headers (JSON)"
                  value={headersText}
                  onChange={(e) => setHeadersText(e.target.value)}
                  rows={6}
                />
                <Textarea
                  label={`Body${hasBody ? '' : ' (이 메서드는 사용 안 함)'}`}
                  value={bodyText}
                  onChange={(e) => setBodyText(e.target.value)}
                  rows={6}
                  disabled={!hasBody}
                />
              </div>

              <div className="mt-5 flex flex-wrap gap-2">
                <Button onClick={sendRequest} disabled={loading} size="lg">
                  {loading ? '요청 중…' : '🚀 요청 보내기'}
                </Button>
                <Button variant="secondary" onClick={() => { setResponse(null); setError(null); setElapsed(null); }} disabled={loading}>
                  응답 지우기
                </Button>
                <Button variant="ghost" onClick={() => {
                  setMethod('GET'); setBaseUrl(DEFAULT_BASE_URL); setEndpoint(DEFAULT_ENDPOINT);
                  setHeadersText('{\n  "Content-Type": "application/json"\n}');
                  setBodyText('{\n  "name": "world"\n}');
                }}>
                  초기화
                </Button>
              </div>
            </Card>

            {/* Response */}
            <Card className="p-5">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-sm font-bold text-slate-700">응답</h2>
                <div className="flex items-center gap-2">
                  {response && (
                    <Badge variant={statusVariant(response.status)}>
                      {response.status} {response.statusText}
                    </Badge>
                  )}
                  {error && <Badge variant="error">요청 실패</Badge>}
                  {elapsed != null && <Badge variant="default">{elapsed} ms</Badge>}
                </div>
              </div>

              {loading && (
                <div className="flex items-center gap-2 text-sm text-slate-500">
                  <div className="w-4 h-4 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                  요청 처리 중…
                </div>
              )}

              {!loading && !response && !error && (
                <div className="py-10 text-center text-sm text-slate-400">
                  아직 응답이 없습니다. 요청을 보내보세요.
                </div>
              )}

              {error && (
                <div className="p-3 bg-rose-50 border border-rose-200 rounded-lg text-sm text-rose-700 whitespace-pre-wrap break-all">
                  {error}
                  <div className="mt-2 text-xs text-rose-500">
                    ※ 네트워크 오류 또는 CORS 문제일 수 있습니다. 서버가 실행 중인지 확인하세요.
                  </div>
                </div>
              )}

              {response && (
                <div className="space-y-4">
                  <div>
                    <div className="text-xs font-semibold text-slate-500 mb-1">응답 헤더</div>
                    <pre className="text-xs bg-slate-50 border border-slate-200 rounded-lg p-3 max-h-40 overflow-auto scrollbar-thin">
{Object.entries(response.headers).map(([k, v]) => `${k}: ${v}`).join('\n')}
                    </pre>
                  </div>
                  <div>
                    <div className="text-xs font-semibold text-slate-500 mb-1">응답 본문</div>
                    <pre className="text-xs bg-slate-900 text-slate-100 rounded-lg p-3 max-h-96 overflow-auto scrollbar-thin whitespace-pre-wrap break-all">
{formatBody(response.body)}
                    </pre>
                  </div>
                </div>
              )}
            </Card>
          </div>

          {/* Right: History */}
          <div className="space-y-6">
            <Card className="p-5">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-sm font-bold text-slate-700">요청 기록</h2>
                {history.length > 0 && (
                  <Button variant="ghost" size="sm" onClick={() => setHistory([])}>지우기</Button>
                )}
              </div>
              {history.length === 0 ? (
                <div className="py-6 text-center text-xs text-slate-400">기록이 없습니다.</div>
              ) : (
                <ul className="space-y-2">
                  {history.map(h => (
                    <li key={h.id}>
                      <button onClick={() => loadFromHistory(h)}
                        className="w-full text-left p-2 rounded-lg border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 transition-colors">
                        <div className="flex items-center gap-2 mb-1">
                          <Badge variant={h.errored ? 'error' : statusVariant(h.status)}>
                            {h.errored ? 'ERR' : h.status}
                          </Badge>
                          <span className="text-xs font-bold text-slate-700">{h.method}</span>
                          <span className="text-[10px] text-slate-400 ml-auto">{h.at} · {h.took}ms</span>
                        </div>
                        <div className="text-xs text-slate-600 truncate">{h.url}</div>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </Card>

            <Card className="p-5">
              <h2 className="text-sm font-bold text-slate-700 mb-2">💡 사용 팁</h2>
              <ul className="text-xs text-slate-600 space-y-1.5 list-disc pl-4">
                <li>같은 오리진 서버면 Endpoint만 수정하면 됩니다.</li>
                <li>Body는 POST/PUT/PATCH에서만 전송됩니다.</li>
                <li>Headers는 유효한 JSON이어야 합니다.</li>
                <li>CORS 오류가 뜨면 서버에서 CORS 헤더를 허용해주세요.</li>
              </ul>
            </Card>
          </div>
        </main>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <div className="min-h-screen">
          <Header />
          <ApiTesterPage />
          <footer className="max-w-6xl mx-auto px-6 py-6 text-center text-xs text-slate-400">
            Hello Server API Tester · single-file React
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
