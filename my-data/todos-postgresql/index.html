<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todos</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 { margin-bottom: 16px; }
  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #f6f6f6;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 24px;
  }
  input, textarea, button {
    font: inherit;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
    width: 100%;
  }
  textarea { resize: vertical; min-height: 60px; }
  button {
    cursor: pointer;
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 14px;
    font-weight: 600;
  }
  button:hover { background: #1d4ed8; }
  ul { list-style: none; padding: 0; }
  li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  li .body { flex: 1; }
  li .title { font-weight: 600; }
  li .content { color: #555; font-size: 14px; margin-top: 4px; white-space: pre-wrap; }
  .completed .title { text-decoration: line-through; color: #999; }
  .del {
    background: #ef4444;
    padding: 6px 10px;
    width: auto;
    font-size: 13px;
  }
  .del:hover { background: #dc2626; }
  .empty { color: #888; font-style: italic; }
</style>
</head>
<body>
  <h1>Todos</h1>

  <form id="todo-form">
    <input id="title" name="title" placeholder="Title" required />
    <textarea id="content" name="content" placeholder="Content (optional)"></textarea>
    <button type="submit">Add todo</button>
  </form>

  <ul id="todo-list"></ul>

  <script src="client.js"></script>
</body>
</html>
