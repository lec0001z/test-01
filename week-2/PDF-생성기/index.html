<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 생성기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 헤더 ── */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { font-size: 1.4rem; color: #4361ee; }
        .logo h1 { font-size: 1.15rem; font-weight: 700; }

        .header-options {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-options select,
        .header-options input[type="text"] {
            padding: 7px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            font-size: 0.82rem;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .header-options select option { color: #333; background: #fff; }
        .header-options input::placeholder { color: rgba(255,255,255,0.4); }

        .btn-download {
            padding: 8px 20px;
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-download:hover { background: #3a56d4; transform: translateY(-1px); }

        /* ── 메인 ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── 에디터 패널 ── */
        .editor-panel {
            width: 42%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e0e0e0;
            background: #fff;
        }

        /* 툴바 */
        .toolbar {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            background: #fafbfc;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .toolbar-group + .toolbar-group {
            margin-left: 4px;
            padding-left: 8px;
            border-left: 1px solid #e0e0e0;
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #555;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .tool-btn:hover { background: #e8eaff; color: #4361ee; }
        .tool-btn.active { background: #4361ee; color: #fff; }

        .tool-btn input[type="color"] {
            width: 20px;
            height: 20px;
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        .color-pick {
            width: 32px;
            height: 32px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 3px;
            cursor: pointer;
            background: #fff;
        }

        .color-pick::-webkit-color-swatch-wrapper { padding: 0; }
        .color-pick::-webkit-color-swatch { border: none; border-radius: 3px; }

        .toolbar select {
            padding: 5px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #555;
            outline: none;
            font-family: inherit;
            background: #fff;
        }

        /* 입력 필드 */
        .editor-fields {
            padding: 12px 16px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-row {
            display: flex;
            gap: 8px;
        }

        .field-row .editor-field { flex: 1; }

        .editor-field label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            display: block;
        }

        .editor-field input {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .editor-field input:focus { border-color: #4361ee; }

        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 16px 14px;
        }

        .editor-content textarea {
            flex: 1;
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            line-height: 1.8;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .editor-content textarea:focus { border-color: #4361ee; }

        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-size: 0.78rem;
            color: #aaa;
        }

        .template-bar {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: #fafbfc;
        }

        .template-chip {
            padding: 5px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.78rem;
            cursor: pointer;
            background: #fff;
            color: #555;
            transition: all 0.2s;
            font-family: inherit;
        }

        .template-chip:hover {
            border-color: #4361ee;
            color: #4361ee;
            background: #eef0ff;
        }

        /* ── 미리보기 패널 ── */
        .preview-panel {
            width: 58%;
            background: #525659;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            gap: 20px;
        }

        .placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
            gap: 12px;
        }

        .placeholder i { font-size: 3rem; color: #777; }

        .page-canvas {
            background: #fff;
            box-shadow: 0 4px 24px rgba(0,0,0,0.35);
            display: block;
        }

        /* ── 토스트 ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.88rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .editor-panel, .preview-panel { width: 100%; height: 50%; }
            .editor-panel { border-right: none; border-bottom: 1px solid #ddd; }
            header { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
            .header-options { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-file-pdf"></i>
            <h1>PDF 생성기</h1>
        </div>
        <div class="header-options">
            <select id="fontSize">
                <option value="10">10pt</option>
                <option value="12" selected>12pt</option>
                <option value="14">14pt</option>
                <option value="16">16pt</option>
            </select>
            <select id="orientation">
                <option value="portrait">세로</option>
                <option value="landscape">가로</option>
            </select>
            <select id="lineSpacing">
                <option value="1.4">줄간격 1.0</option>
                <option value="1.8" selected>줄간격 1.5</option>
                <option value="2.2">줄간격 2.0</option>
                <option value="2.8">줄간격 2.5</option>
            </select>
            <input type="text" id="filename" placeholder="파일 이름" style="width:110px;">
            <button class="btn-download" id="btnDownload">
                <i class="fa-solid fa-download"></i> 다운로드
            </button>
        </div>
    </header>

    <div class="main">
        <div class="editor-panel">
            <!-- 템플릿 바 -->
            <div class="template-bar">
                <span style="font-size:0.78rem; color:#999; margin-right:4px; align-self:center;">템플릿:</span>
                <button class="template-chip" data-template="report">보고서</button>
                <button class="template-chip" data-template="letter">편지</button>
                <button class="template-chip" data-template="meeting">회의록</button>
                <button class="template-chip" data-template="resume">이력서</button>
                <button class="template-chip" data-template="clear">초기화</button>
            </div>

            <!-- 툴바 -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <select id="textAlign">
                        <option value="left">왼쪽 정렬</option>
                        <option value="center">가운데 정렬</option>
                        <option value="right">오른쪽 정렬</option>
                    </select>
                </div>
                <div class="toolbar-group">
                    <label style="font-size:0.75rem; color:#888; margin-right:4px;">제목색</label>
                    <input type="color" class="color-pick" id="titleColor" value="#1a1a2e">
                </div>
                <div class="toolbar-group">
                    <label style="font-size:0.75rem; color:#888; margin-right:4px;">본문색</label>
                    <input type="color" class="color-pick" id="bodyColor" value="#333333">
                </div>
                <div class="toolbar-group">
                    <button class="tool-btn" id="toggleDate" title="날짜 표시">
                        <i class="fa-regular fa-calendar"></i>
                    </button>
                    <button class="tool-btn" id="toggleBorder" title="페이지 테두리">
                        <i class="fa-regular fa-square"></i>
                    </button>
                    <button class="tool-btn" id="toggleWatermark" title="워터마크">
                        <i class="fa-solid fa-droplet"></i>
                    </button>
                </div>
                <div class="toolbar-group">
                    <input type="text" id="watermarkText" placeholder="워터마크 텍스트"
                        style="padding:5px 8px; border:1px solid #e0e0e0; border-radius:6px; font-size:0.78rem; width:110px; outline:none; display:none; font-family:inherit;">
                </div>
            </div>

            <!-- 입력 -->
            <div class="editor-fields">
                <div class="field-row">
                    <div class="editor-field">
                        <label>제목</label>
                        <input type="text" id="title" placeholder="문서 제목">
                    </div>
                    <div class="editor-field">
                        <label>작성자</label>
                        <input type="text" id="author" placeholder="작성자">
                    </div>
                </div>
            </div>

            <div class="editor-content">
                <textarea id="content" placeholder="내용을 입력하면 오른쪽에 PDF 미리보기가 실시간으로 표시됩니다..."></textarea>
                <div class="editor-footer">
                    <span id="pageInfo">0 페이지</span>
                    <span><span id="charCount">0</span>자</span>
                </div>
            </div>
        </div>

        <div class="preview-panel" id="previewPanel">
            <div class="placeholder" id="placeholder">
                <i class="fa-regular fa-file-lines"></i>
                내용을 입력하면 PDF 미리보기가 표시됩니다
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script>
        // ── 요소 ──
        const titleEl = document.getElementById('title');
        const authorEl = document.getElementById('author');
        const contentEl = document.getElementById('content');
        const fontSizeEl = document.getElementById('fontSize');
        const orientationEl = document.getElementById('orientation');
        const lineSpacingEl = document.getElementById('lineSpacing');
        const filenameEl = document.getElementById('filename');
        const charCountEl = document.getElementById('charCount');
        const pageInfoEl = document.getElementById('pageInfo');
        const previewPanel = document.getElementById('previewPanel');
        const placeholder = document.getElementById('placeholder');
        const btnDownload = document.getElementById('btnDownload');
        const toastEl = document.getElementById('toast');
        const textAlignEl = document.getElementById('textAlign');
        const titleColorEl = document.getElementById('titleColor');
        const bodyColorEl = document.getElementById('bodyColor');
        const watermarkTextEl = document.getElementById('watermarkText');

        let updateTimer = null;
        let fontBase64 = null;
        let fontReady = false;

        // 토글 상태
        let showDate = false;
        let showBorder = false;
        let showWatermark = false;

        // ── 토글 버튼 ──
        document.getElementById('toggleDate').addEventListener('click', function () {
            showDate = !showDate;
            this.classList.toggle('active', showDate);
            renderPreview();
        });

        document.getElementById('toggleBorder').addEventListener('click', function () {
            showBorder = !showBorder;
            this.classList.toggle('active', showBorder);
            renderPreview();
        });

        document.getElementById('toggleWatermark').addEventListener('click', function () {
            showWatermark = !showWatermark;
            this.classList.toggle('active', showWatermark);
            watermarkTextEl.style.display = showWatermark ? 'block' : 'none';
            renderPreview();
        });

        watermarkTextEl.addEventListener('input', schedulePreview);

        // ── 템플릿 ──
        const templates = {
            report: {
                title: '업무 보고서',
                author: '',
                content: `1. 개요\n보고 내용에 대한 간략한 요약을 작성합니다.\n\n2. 현황\n현재 진행 상황을 구체적으로 기술합니다.\n- 항목 1\n- 항목 2\n- 항목 3\n\n3. 문제점 및 개선 방안\n발생한 문제점과 그에 대한 개선 방안을 제시합니다.\n\n4. 향후 계획\n앞으로의 진행 계획을 단계별로 작성합니다.\n\n5. 결론\n보고 내용을 종합하여 결론을 기술합니다.`
            },
            letter: {
                title: '',
                author: '',
                content: `안녕하세요.\n\n바쁘신 중에 이렇게 편지를 드리게 되어 죄송합니다.\n\n\n\n\n\n감사합니다.\n\n보내는 사람 드림`
            },
            meeting: {
                title: '회의록',
                author: '',
                content: `회의 일시: ${new Date().toLocaleDateString('ko-KR')}\n회의 장소: \n참석자: \n\n[안건 1]\n- 논의 내용:\n- 결정 사항:\n- 담당자:\n\n[안건 2]\n- 논의 내용:\n- 결정 사항:\n- 담당자:\n\n[기타 사항]\n\n\n[다음 회의]\n- 일시:\n- 안건:`
            },
            resume: {
                title: '이력서',
                author: '',
                content: `이름: \n연락처: \n이메일: \n\n[학력]\n- 20xx ~ 20xx  OO대학교 OO학과\n\n[경력]\n- 20xx.xx ~ 현재  OO회사 / OO팀 / OO 직무\n  주요 업무 내용을 기술합니다.\n\n- 20xx.xx ~ 20xx.xx  OO회사 / OO팀\n  주요 업무 내용을 기술합니다.\n\n[자격증]\n- \n\n[기술 스택]\n- \n\n[자기소개]\n`
            },
            clear: { title: '', author: '', content: '' }
        };

        document.querySelectorAll('.template-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                const t = templates[btn.dataset.template];
                if (!t) return;
                titleEl.value = t.title;
                authorEl.value = t.author;
                contentEl.value = t.content;
                charCountEl.textContent = t.content.length;
                renderPreview();
            });
        });

        // ── 폰트 로드 ──
        async function loadFont() {
            try {
                const url = 'https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/public/static/Pretendard-Regular.subset.otf';
                const res = await fetch(url);
                if (!res.ok) throw new Error('Font fetch failed');
                const buf = await res.arrayBuffer();
                const bytes = new Uint8Array(buf);
                let bin = '';
                for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                fontBase64 = btoa(bin);
                fontReady = true;
                renderPreview();
            } catch (e) {
                console.warn('폰트 로드 실패:', e);
                fontReady = false;
                renderPreview();
            }
        }
        loadFont();

        // ── 오늘 날짜 ──
        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
        }

        // ── Canvas 미리보기 렌더링 ──
        function renderPreview() {
            const title = titleEl.value.trim();
            const author = authorEl.value.trim();
            const content = contentEl.value;
            const fontSize = parseInt(fontSizeEl.value);
            const orientation = orientationEl.value;
            const spacingMultiplier = parseFloat(lineSpacingEl.value);
            const textAlign = textAlignEl.value;
            const titleColor = titleColorEl.value;
            const bodyColor = bodyColorEl.value;
            const watermark = watermarkTextEl.value.trim();

            if (!title && !author && !content.trim()) {
                const canvases = previewPanel.querySelectorAll('.page-canvas');
                canvases.forEach(c => c.remove());
                placeholder.style.display = 'flex';
                pageInfoEl.textContent = '0 페이지';
                return;
            }

            placeholder.style.display = 'none';

            const A4_W = orientation === 'portrait' ? 210 : 297;
            const A4_H = orientation === 'portrait' ? 297 : 210;
            const S = 2.5;
            const cW = A4_W * S;
            const cH = A4_H * S;
            const M = 20 * S;
            const maxTW = cW - M * 2;

            const pages = [[]];
            let cp = 0;
            let y = M;

            const tFS = (fontSize + 8) * S * 0.35;
            const bFS = fontSize * S * 0.35;
            const aFS = (fontSize - 1) * S * 0.35;
            const lH = bFS * spacingMultiplier;
            const tLH = tFS * 1.6;

            function add(item) { pages[cp].push(item); }
            function np() { cp++; pages.push([]); y = M; }

            const mC = document.createElement('canvas');
            const mCtx = mC.getContext('2d');

            function wrap(text, font, mw) {
                mCtx.font = font;
                const lines = [];
                let cur = '';
                for (const ch of text) {
                    const test = cur + ch;
                    if (mCtx.measureText(test).width > mw && cur) {
                        lines.push(cur);
                        cur = ch;
                    } else {
                        cur = test;
                    }
                }
                if (cur) lines.push(cur);
                return lines.length > 0 ? lines : [''];
            }

            const bFont = `${bFS}px 'Noto Sans KR', sans-serif`;
            const tFont = `bold ${tFS}px 'Noto Sans KR', sans-serif`;
            const aFont = `${aFS}px 'Noto Sans KR', sans-serif`;

            // 날짜
            if (showDate) {
                if (y + aFS > cH - M) np();
                add({ type: 'date', text: getTodayStr(), y });
                y += aFS * 2.2;
            }

            // 제목
            if (title) {
                const tLines = wrap(title, tFont, maxTW);
                for (const line of tLines) {
                    if (y + tLH > cH - M) np();
                    add({ type: 'title', text: line, y });
                    y += tLH;
                }
                y += 8 * S * 0.3;
            }

            // 작성자
            if (author) {
                if (y + aFS > cH - M) np();
                add({ type: 'author', text: author, y });
                y += aFS * 2;
            }

            // 구분선
            if (title || author) {
                if (y + 10 > cH - M) np();
                add({ type: 'line', y });
                y += 14 * S * 0.3;
            }

            // 본문
            if (content) {
                const paras = content.split('\n');
                for (const para of paras) {
                    if (para.trim() === '') {
                        y += lH * 0.5;
                        if (y > cH - M) np();
                        continue;
                    }
                    const lines = wrap(para, bFont, maxTW);
                    for (const line of lines) {
                        if (y + lH > cH - M) np();
                        add({ type: 'body', text: line, y });
                        y += lH;
                    }
                }
            }

            // 기존 캔버스 제거
            const old = previewPanel.querySelectorAll('.page-canvas');
            old.forEach(c => c.remove());

            const total = pages.length;
            pageInfoEl.textContent = `${total} 페이지`;

            for (let p = 0; p < total; p++) {
                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas';
                canvas.width = cW;
                canvas.height = cH;

                const dW = Math.min(previewPanel.clientWidth - 48, 595);
                canvas.style.width = dW + 'px';
                canvas.style.height = (dW * (A4_H / A4_W)) + 'px';

                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, cW, cH);

                // 워터마크
                if (showWatermark && watermark) {
                    ctx.save();
                    ctx.translate(cW / 2, cH / 2);
                    ctx.rotate(-Math.PI / 6);
                    ctx.font = `bold ${cW * 0.08}px 'Noto Sans KR', sans-serif`;
                    ctx.fillStyle = 'rgba(0,0,0,0.04)';
                    ctx.textAlign = 'center';
                    ctx.fillText(watermark, 0, -cH * 0.15);
                    ctx.fillText(watermark, 0, cH * 0.15);
                    ctx.restore();
                }

                // 테두리
                if (showBorder) {
                    ctx.strokeStyle = '#cccccc';
                    ctx.lineWidth = 2;
                    const bm = M * 0.6;
                    ctx.strokeRect(bm, bm, cW - bm * 2, cH - bm * 2);
                }

                // 내용
                for (const item of pages[p]) {
                    if (item.type === 'date') {
                        ctx.font = `${aFS}px 'Noto Sans KR', sans-serif`;
                        ctx.fillStyle = '#999999';
                        ctx.textAlign = 'right';
                        ctx.fillText(item.text, cW - M, item.y + aFS);
                    } else if (item.type === 'title') {
                        ctx.font = tFont;
                        ctx.fillStyle = titleColor;
                        ctx.textAlign = 'center';
                        ctx.fillText(item.text, cW / 2, item.y + tFS);
                    } else if (item.type === 'author') {
                        ctx.font = aFont;
                        ctx.fillStyle = '#787878';
                        ctx.textAlign = 'center';
                        ctx.fillText(item.text, cW / 2, item.y + aFS);
                    } else if (item.type === 'line') {
                        ctx.strokeStyle = titleColor + '44';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(M, item.y);
                        ctx.lineTo(cW - M, item.y);
                        ctx.stroke();
                    } else if (item.type === 'body') {
                        ctx.font = bFont;
                        ctx.fillStyle = bodyColor;
                        if (textAlign === 'center') {
                            ctx.textAlign = 'center';
                            ctx.fillText(item.text, cW / 2, item.y + bFS);
                        } else if (textAlign === 'right') {
                            ctx.textAlign = 'right';
                            ctx.fillText(item.text, cW - M, item.y + bFS);
                        } else {
                            ctx.textAlign = 'left';
                            ctx.fillText(item.text, M, item.y + bFS);
                        }
                    }
                }

                // 페이지 번호
                ctx.font = `${bFS * 0.75}px 'Noto Sans KR', sans-serif`;
                ctx.fillStyle = '#999999';
                ctx.textAlign = 'center';
                ctx.fillText(`${p + 1} / ${total}`, cW / 2, cH - M * 0.5);

                previewPanel.appendChild(canvas);
            }
        }

        function schedulePreview() {
            clearTimeout(updateTimer);
            updateTimer = setTimeout(renderPreview, 200);
        }

        // ── 이벤트 ──
        titleEl.addEventListener('input', schedulePreview);
        authorEl.addEventListener('input', schedulePreview);
        contentEl.addEventListener('input', function () {
            charCountEl.textContent = contentEl.value.length;
            schedulePreview();
        });
        fontSizeEl.addEventListener('change', renderPreview);
        orientationEl.addEventListener('change', renderPreview);
        lineSpacingEl.addEventListener('change', renderPreview);
        textAlignEl.addEventListener('change', renderPreview);
        titleColorEl.addEventListener('input', renderPreview);
        bodyColorEl.addEventListener('input', renderPreview);

        // ── 토스트 ──
        function showToast(msg, icon) {
            toastEl.innerHTML = (icon ? `<i class="${icon}"></i> ` : '') + msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        // ── jsPDF 다운로드 ──
        btnDownload.addEventListener('click', async function () {
            const jsPDFLib = window.jspdf;
            if (!jsPDFLib) { showToast('잠시 후 다시 시도해주세요.', 'fa-solid fa-spinner'); return; }

            const title = titleEl.value.trim();
            const author = authorEl.value.trim();
            const content = contentEl.value.trim();
            const fontSize = parseInt(fontSizeEl.value);
            const orientation = orientationEl.value;
            const filename = filenameEl.value.trim() || 'document';
            const spacingMultiplier = parseFloat(lineSpacingEl.value);
            const textAlign = textAlignEl.value;
            const titleColor = titleColorEl.value;
            const bodyColor = bodyColorEl.value;
            const watermark = watermarkTextEl.value.trim();

            if (!title && !content) { showToast('내용을 입력해주세요.', 'fa-solid fa-triangle-exclamation'); return; }

            const doc = new jsPDFLib.jsPDF({ orientation, unit: 'mm', format: 'a4' });

            if (fontReady && fontBase64) {
                doc.addFileToVFS('Pretendard.otf', fontBase64);
                doc.addFont('Pretendard.otf', 'Pretendard', 'normal');
                doc.setFont('Pretendard');
            }

            const pW = doc.internal.pageSize.getWidth();
            const pH = doc.internal.pageSize.getHeight();
            const mg = 20;
            const mW = pW - mg * 2;
            let y = mg;

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return [r, g, b];
            }

            const [tr, tg, tb] = hexToRgb(titleColor);
            const [br, bg, bb] = hexToRgb(bodyColor);

            // 날짜
            if (showDate) {
                doc.setFontSize(fontSize - 2);
                if (fontReady) doc.setFont('Pretendard');
                doc.setTextColor(150, 150, 150);
                doc.text(getTodayStr(), pW - mg, y, { align: 'right' });
                y += 8;
                doc.setTextColor(0, 0, 0);
            }

            if (title) {
                doc.setProperties({ title, author: author || '' });
                doc.setFontSize(fontSize + 8);
                if (fontReady) doc.setFont('Pretendard');
                doc.setTextColor(tr, tg, tb);
                const tLines = doc.splitTextToSize(title, mW);
                const tlh = (fontSize + 8) * 0.5;
                for (const line of tLines) {
                    if (y + tlh > pH - mg) { doc.addPage(); y = mg; }
                    doc.text(line, pW / 2, y, { align: 'center' });
                    y += tlh;
                }
                y += 4;
            }

            if (author) {
                doc.setFontSize(fontSize - 1);
                if (fontReady) doc.setFont('Pretendard');
                doc.setTextColor(120, 120, 120);
                doc.text(author, pW / 2, y, { align: 'center' });
                y += 8;
            }

            if (title || author) {
                doc.setDrawColor(200, 200, 200);
                doc.line(mg, y, pW - mg, y);
                y += 10;
            }

            if (content) {
                doc.setFontSize(fontSize);
                if (fontReady) doc.setFont('Pretendard');
                doc.setTextColor(br, bg, bb);
                const lh = fontSize * 0.5 * (spacingMultiplier / 1.8) * 1.8;
                const paras = content.split('\n');
                for (const para of paras) {
                    if (para.trim() === '') {
                        y += lh * 0.6;
                        if (y > pH - mg) { doc.addPage(); y = mg; }
                        continue;
                    }
                    const lines = doc.splitTextToSize(para, mW);
                    for (const line of lines) {
                        if (y + lh > pH - mg) { doc.addPage(); y = mg; }
                        if (textAlign === 'center') doc.text(line, pW / 2, y, { align: 'center' });
                        else if (textAlign === 'right') doc.text(line, pW - mg, y, { align: 'right' });
                        else doc.text(line, mg, y);
                        y += lh;
                    }
                }
            }

            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);

                // 워터마크
                if (showWatermark && watermark) {
                    doc.setFontSize(pW * 0.15);
                    if (fontReady) doc.setFont('Pretendard');
                    doc.setTextColor(230, 230, 230);
                    doc.text(watermark, pW / 2, pH / 2 - 20, { align: 'center', angle: 30 });
                    doc.text(watermark, pW / 2, pH / 2 + 40, { align: 'center', angle: 30 });
                }

                // 테두리
                if (showBorder) {
                    doc.setDrawColor(200, 200, 200);
                    doc.setLineWidth(0.5);
                    doc.rect(10, 10, pW - 20, pH - 20);
                }

                // 페이지 번호
                doc.setFontSize(9);
                if (fontReady) doc.setFont('Pretendard');
                doc.setTextColor(150, 150, 150);
                doc.text(`${i} / ${totalPages}`, pW / 2, pH - 10, { align: 'center' });
            }

            doc.save(`${filename}.pdf`);
            showToast('PDF가 다운로드되었습니다!', 'fa-solid fa-check');
        });
    </script>
</body>
</html>
