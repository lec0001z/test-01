<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children }) {
      const base = 'font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 cursor-pointer';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500',
        secondary: 'bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost: 'bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-base',
        lg: 'px-6 py-3 text-lg',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, className = '', ...rest }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition bg-white"
            {...rest}
          />
        </div>
      );
    }

    function Card({ title, children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-5 ${className}`}>
          {title && <h2 className="text-lg font-bold text-gray-900 mb-4">{title}</h2>}
          {children}
        </div>
      );
    }

    function Toggle({ checked, onChange, label }) {
      return (
        <label className="flex items-center gap-2 cursor-pointer select-none">
          <div
            onClick={() => onChange(!checked)}
            className={`relative w-11 h-6 rounded-full transition-colors duration-200 ${
              checked ? 'bg-emerald-500' : 'bg-gray-300'
            }`}
          >
            <div
              className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200 ${
                checked ? 'translate-x-5' : 'translate-x-0'
              }`}
            />
          </div>
          {label && <span className="text-sm text-gray-700">{label}</span>}
        </label>
      );
    }

    // ========================================
    // 🛠️ Utility Functions
    // ========================================

    function calcMenuPrice(menu) {
      const price = Number(menu.price) || 0;
      if (!menu.discounted) return price;
      const discountVal = Number(menu.discountValue) || 0;
      if (menu.discountType === 'percent') {
        return Math.round(price * (1 - discountVal / 100));
      }
      return Math.max(0, price - discountVal);
    }

    let nextId = 1;
    function uid() {
      return 'id_' + nextId++;
    }

    function createMenu() {
      return { id: uid(), name: '', price: '', discounted: false, discountType: 'percent', discountValue: '' };
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [names, setNames] = useState([]);
      const [nameInput, setNameInput] = useState('');
      const [menus, setMenus] = useState([createMenu()]);

      // 이름 Enter로 추가
      const handleNameKeyDown = (e) => {
        if (e.key === 'Enter') {
          const trimmed = nameInput.trim();
          if (trimmed === '' || names.includes(trimmed)) return;
          setNames((prev) => [...prev, trimmed]);
          setNameInput('');
        }
      };

      const removeName = (idx) => {
        setNames((prev) => prev.filter((_, i) => i !== idx));
      };

      // 메뉴 관리
      const addMenu = () => {
        setMenus((prev) => [...prev, createMenu()]);
      };

      const updateMenu = useCallback((menuId, field, value) => {
        setMenus((prev) =>
          prev.map((m) => (m.id === menuId ? { ...m, [field]: value } : m))
        );
      }, []);

      const removeMenu = useCallback((menuId) => {
        setMenus((prev) => prev.filter((m) => m.id !== menuId));
      }, []);

      // 계산
      const grandTotal = useMemo(
        () => menus.reduce((sum, m) => sum + calcMenuPrice(m), 0),
        [menus]
      );

      const perPerson = names.length > 0 ? Math.ceil(grandTotal / names.length) : 0;

      const resetAll = () => {
        setNames([]);
        setNameInput('');
        setMenus([createMenu()]);
      };

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Header */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
              <div>
                <h1 className="text-2xl font-bold text-gray-900">🧾 더치페이 계산기</h1>
                <div className="flex gap-4 mt-1 text-sm text-gray-500">
                  <span>인원: <strong className="text-indigo-600">{names.length}명</strong></span>
                  <span>총액: <strong className="text-indigo-600">{grandTotal.toLocaleString()}원</strong></span>
                </div>
              </div>
              <Button variant="secondary" size="sm" onClick={resetAll}>초기화</Button>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 py-6 space-y-5">

            {/* ===== 인원 입력 ===== */}
            <Card title="👥 인원">
              <input
                type="text"
                value={nameInput}
                onChange={(e) => setNameInput(e.target.value)}
                onKeyDown={handleNameKeyDown}
                placeholder="이름 입력 후 Enter"
                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-base focus:outline-none focus:border-indigo-500 transition"
                autoFocus
              />

              {names.length > 0 && (
                <div className="flex flex-wrap gap-2 mt-3">
                  {names.map((name, i) => (
                    <span
                      key={i}
                      className="inline-flex items-center gap-1 px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-full text-sm font-medium fade-in"
                    >
                      <span className="w-6 h-6 rounded-full bg-indigo-200 flex items-center justify-center text-xs font-bold">
                        {name[0]}
                      </span>
                      {name}
                      <button
                        onClick={() => removeName(i)}
                        className="ml-1 w-5 h-5 rounded-full hover:bg-indigo-300 flex items-center justify-center text-indigo-400 hover:text-indigo-700 transition cursor-pointer text-xs"
                      >
                        ✕
                      </button>
                    </span>
                  ))}
                </div>
              )}
            </Card>

            {/* ===== 메뉴 입력 ===== */}
            <Card title="🍽️ 메뉴">
              <div className="space-y-3">
                {menus.map((menu) => (
                  <div key={menu.id} className="flex flex-wrap items-center gap-2 p-3 bg-gray-50 rounded-xl fade-in">
                    <Input
                      value={menu.name}
                      onChange={(e) => updateMenu(menu.id, 'name', e.target.value)}
                      placeholder="메뉴명"
                      className="flex-1 min-w-[100px]"
                    />
                    <Input
                      type="number"
                      value={menu.price}
                      onChange={(e) => updateMenu(menu.id, 'price', e.target.value)}
                      placeholder="가격"
                      className="w-28"
                      min="0"
                    />
                    <div className="flex items-center gap-2">
                      <Toggle
                        checked={menu.discounted}
                        onChange={(val) => updateMenu(menu.id, 'discounted', val)}
                      />
                      <span className="text-xs text-gray-500 whitespace-nowrap">
                        {menu.discounted ? '할인 적용' : '할인 없음'}
                      </span>
                    </div>
                    {menu.discounted && (
                      <div className="flex items-center gap-1 fade-in">
                        <Input
                          type="number"
                          value={menu.discountValue}
                          onChange={(e) => updateMenu(menu.id, 'discountValue', e.target.value)}
                          placeholder="할인"
                          className="w-20"
                          min="0"
                        />
                        <select
                          value={menu.discountType}
                          onChange={(e) => updateMenu(menu.id, 'discountType', e.target.value)}
                          className="px-2 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400"
                        >
                          <option value="percent">%</option>
                          <option value="amount">원</option>
                        </select>
                      </div>
                    )}
                    <Button variant="ghost" size="sm" onClick={() => removeMenu(menu.id)}>
                      🗑️
                    </Button>
                    {/* 할인 후 가격 표시 */}
                    {menu.discounted && Number(menu.price) > 0 && (
                      <div className="w-full text-right text-xs text-emerald-600 font-medium -mt-1">
                        할인 적용가: {calcMenuPrice(menu).toLocaleString()}원
                      </div>
                    )}
                  </div>
                ))}

                <button
                  onClick={addMenu}
                  className="w-full py-2.5 border-2 border-dashed border-gray-300 rounded-xl text-sm text-gray-400 hover:border-indigo-400 hover:text-indigo-500 transition cursor-pointer"
                >
                  + 메뉴 추가
                </button>
              </div>
            </Card>

            {/* ===== 정산 결과 ===== */}
            {names.length > 0 && grandTotal > 0 && (
              <Card className="bg-gradient-to-br from-indigo-50 to-purple-50 border-indigo-200 fade-in">
                <h2 className="text-lg font-bold text-gray-900 mb-4">📊 정산 결과</h2>

                <div className="space-y-3">
                  {names.map((name, i) => (
                    <div key={i} className="flex items-center justify-between py-2 px-3 bg-white/70 rounded-xl">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">
                          {name[0]}
                        </div>
                        <span className="font-medium text-gray-800">{name}</span>
                      </div>
                      <span className="font-bold text-indigo-600">{perPerson.toLocaleString()}원</span>
                    </div>
                  ))}
                </div>

                <div className="mt-4 pt-3 border-t border-indigo-200 space-y-2">
                  <div className="flex items-center justify-between">
                    <span className="font-semibold text-gray-700">총 합계</span>
                    <span className="text-xl font-bold text-indigo-700">{grandTotal.toLocaleString()}원</span>
                  </div>
                  <div className="flex items-center justify-between text-sm text-gray-500">
                    <span>1인당</span>
                    <span className="font-semibold text-indigo-600">{perPerson.toLocaleString()}원</span>
                  </div>
                </div>
              </Card>
            )}

            <p className="text-center text-xs text-gray-400 pb-6">
              같이 먹은 만큼 공평하게 나누세요
            </p>
          </main>
        </div>
      );
    }

    // ========================================
    // 🎬 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
