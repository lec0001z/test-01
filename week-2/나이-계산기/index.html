<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대한민국 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = 'text', value, onChange, min, max, placeholder, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-600">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            min={min}
            max={max}
            placeholder={placeholder}
            className="border border-gray-300 rounded-lg px-4 py-2.5 text-center text-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
          />
        </div>
      );
    }

    function Button({ children, onClick, variant = 'primary', className = '' }) {
      const base = 'px-6 py-3 rounded-lg font-semibold text-lg transition-all duration-200 active:scale-95';
      const variants = {
        primary: 'bg-indigo-500 hover:bg-indigo-600 text-white shadow-md hover:shadow-lg',
        secondary: 'bg-gray-200 hover:bg-gray-300 text-gray-700',
      };
      return (
        <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    // ========================================
    // 📄 만 나이 계산기
    // ========================================

    function AgeCalculator() {
      const [birthYear, setBirthYear] = useState('');
      const [birthMonth, setBirthMonth] = useState('');
      const [birthDay, setBirthDay] = useState('');
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      function calculateAge() {
        setError('');
        setResult(null);

        const y = parseInt(birthYear, 10);
        const m = parseInt(birthMonth, 10);
        const d = parseInt(birthDay, 10);

        if (!y || !m || !d) {
          setError('생년월일을 모두 입력해주세요.');
          return;
        }

        const birthDate = new Date(y, m - 1, d);
        if (
          birthDate.getFullYear() !== y ||
          birthDate.getMonth() !== m - 1 ||
          birthDate.getDate() !== d
        ) {
          setError('유효하지 않은 날짜입니다.');
          return;
        }

        const today = new Date();
        if (birthDate > today) {
          setError('미래 날짜는 입력할 수 없습니다.');
          return;
        }

        // 만 나이: 생일이 지났으면 연도 차이, 안 지났으면 -1
        let manAge = today.getFullYear() - y;
        const monthDiff = today.getMonth() - (m - 1);
        const dayDiff = today.getDate() - d;
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
          manAge--;
        }

        // 한국 나이 (세는 나이): 태어나면 1살, 새해마다 +1
        const koreanAge = today.getFullYear() - y + 1;

        // 연 나이: 올해 연도 - 출생 연도 (생일 무관)
        const yearAge = today.getFullYear() - y;

        // 다음 생일까지
        const nextBirthday = new Date(today.getFullYear(), m - 1, d);
        if (nextBirthday <= today) {
          nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
        }
        const diffMs = nextBirthday - today;
        const daysUntilBirthday = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

        setResult({ manAge, koreanAge, yearAge, daysUntilBirthday });
      }

      function handleReset() {
        setBirthYear('');
        setBirthMonth('');
        setBirthDay('');
        setResult(null);
        setError('');
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-4">
          <Card className="w-full max-w-md">
            <h1 className="text-2xl sm:text-3xl font-bold text-center text-gray-800 mb-6">
              대한민국 나이 계산기
            </h1>

            <div className="grid grid-cols-3 gap-3 mb-6">
              <Input
                label="년"
                type="number"
                value={birthYear}
                onChange={(e) => setBirthYear(e.target.value)}
                placeholder="2000"
                min="1900"
                max={new Date().getFullYear()}
              />
              <Input
                label="월"
                type="number"
                value={birthMonth}
                onChange={(e) => setBirthMonth(e.target.value)}
                placeholder="1"
                min="1"
                max="12"
              />
              <Input
                label="일"
                type="number"
                value={birthDay}
                onChange={(e) => setBirthDay(e.target.value)}
                placeholder="1"
                min="1"
                max="31"
              />
            </div>

            {error && (
              <p className="text-red-500 text-sm text-center mb-4">{error}</p>
            )}

            <div className="flex gap-3">
              <Button onClick={calculateAge} className="flex-1">계산하기</Button>
              <Button onClick={handleReset} variant="secondary">초기화</Button>
            </div>

            {result && (
              <div className="mt-6 space-y-3">
                <div className="bg-indigo-50 rounded-xl p-5 text-center">
                  <p className="text-gray-500 text-sm mb-1">만 나이 (국제 표준)</p>
                  <p className="text-4xl font-bold text-indigo-600">
                    {result.manAge}<span className="text-xl ml-1">세</span>
                  </p>
                  <p className="text-xs text-gray-400 mt-1">2023년부터 법적 기준</p>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-amber-50 rounded-xl p-4 text-center">
                    <p className="text-gray-500 text-xs mb-1">한국 나이 (세는 나이)</p>
                    <p className="text-3xl font-bold text-amber-600">
                      {result.koreanAge}<span className="text-lg ml-1">세</span>
                    </p>
                    <p className="text-xs text-gray-400 mt-1">태어나면 1살, 새해 +1</p>
                  </div>
                  <div className="bg-emerald-50 rounded-xl p-4 text-center">
                    <p className="text-gray-500 text-xs mb-1">연 나이</p>
                    <p className="text-3xl font-bold text-emerald-600">
                      {result.yearAge}<span className="text-lg ml-1">세</span>
                    </p>
                    <p className="text-xs text-gray-400 mt-1">올해 - 출생연도</p>
                  </div>
                </div>

                <p className="text-gray-500 text-sm text-center mt-2">
                  다음 생일까지 <span className="font-semibold text-indigo-500">{result.daysUntilBirthday}일</span> 남았습니다
                </p>
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return <AgeCalculator />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
