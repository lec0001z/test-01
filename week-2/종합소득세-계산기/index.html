<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종합소득세 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '', title, subtitle }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 ${className}`}>
          {title && (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800">{title}</h2>
              {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
            </div>
          )}
          {children}
        </div>
      );
    }

    function InputField({ label, value, onChange, placeholder, suffix = '원', helpText, id }) {
      const formatNumber = (num) => {
        if (!num && num !== 0) return '';
        return Number(num).toLocaleString('ko-KR');
      };

      const handleChange = (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        onChange(raw === '' ? '' : Number(raw));
      };

      return (
        <div className="mb-4">
          <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1.5">
            {label}
          </label>
          <div className="relative">
            <input
              id={id}
              type="text"
              inputMode="numeric"
              value={value === '' ? '' : formatNumber(value)}
              onChange={handleChange}
              placeholder={placeholder}
              className="w-full px-4 py-3 pr-10 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-right text-gray-800 text-base"
            />
            {suffix && (
              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">
                {suffix}
              </span>
            )}
          </div>
          {helpText && <p className="text-xs text-gray-400 mt-1">{helpText}</p>}
        </div>
      );
    }

    function Button({ children, onClick, variant = 'primary', size = 'md', className = '', disabled = false }) {
      const base = 'font-semibold rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 inline-flex items-center justify-center';
      const variants = {
        primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-sm',
        secondary: 'bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-400',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
      };
      const sizes = {
        sm: 'px-4 py-2 text-sm',
        md: 'px-6 py-3 text-base',
        lg: 'px-8 py-4 text-lg',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Badge({ children, color = 'blue' }) {
      const colors = {
        blue: 'bg-blue-100 text-blue-700',
        green: 'bg-green-100 text-green-700',
        red: 'bg-red-100 text-red-700',
        yellow: 'bg-yellow-100 text-yellow-700',
        gray: 'bg-gray-100 text-gray-600',
        purple: 'bg-purple-100 text-purple-700',
      };
      return (
        <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function ProgressBar({ value, max, color = 'blue', label, showPercent = true }) {
      const percent = max > 0 ? Math.min((value / max) * 100, 100) : 0;
      const colors = {
        blue: 'bg-blue-500',
        green: 'bg-green-500',
        red: 'bg-red-500',
        yellow: 'bg-yellow-500',
        purple: 'bg-purple-500',
      };
      return (
        <div className="mb-2">
          {label && (
            <div className="flex justify-between text-xs text-gray-500 mb-1">
              <span>{label}</span>
              {showPercent && <span>{percent.toFixed(1)}%</span>}
            </div>
          )}
          <div className="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
            <div
              className={`h-full rounded-full transition-all duration-500 ${colors[color]}`}
              style={{ width: `${percent}%` }}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // 🧮 세금 계산 로직
    // ========================================

    const TAX_BRACKETS = [
      { min: 0,           max: 14000000,     rate: 0.06, deduction: 0 },
      { min: 14000000,    max: 50000000,     rate: 0.15, deduction: 1260000 },
      { min: 50000000,    max: 88000000,     rate: 0.24, deduction: 5760000 },
      { min: 88000000,    max: 150000000,    rate: 0.35, deduction: 15440000 },
      { min: 150000000,   max: 300000000,    rate: 0.38, deduction: 19940000 },
      { min: 300000000,   max: 500000000,    rate: 0.40, deduction: 25940000 },
      { min: 500000000,   max: 1000000000,   rate: 0.42, deduction: 35940000 },
      { min: 1000000000,  max: Infinity,     rate: 0.45, deduction: 65940000 },
    ];

    const LOCAL_TAX_RATE = 0.10; // 지방소득세 10%

    function calculateTax(taxableIncome) {
      if (taxableIncome <= 0) return { tax: 0, bracket: null, bracketDetails: [] };

      let bracket = TAX_BRACKETS.find(b => taxableIncome > b.min && taxableIncome <= b.max);
      if (!bracket) bracket = TAX_BRACKETS[TAX_BRACKETS.length - 1];

      const tax = taxableIncome * bracket.rate - bracket.deduction;

      const bracketDetails = TAX_BRACKETS.map(b => {
        const rangeMin = b.min;
        const rangeMax = b.max === Infinity ? null : b.max;
        const taxableInRange = Math.max(0, Math.min(taxableIncome, b.max === Infinity ? taxableIncome : b.max) - b.min);
        const taxInRange = taxableInRange > 0 ? taxableInRange * b.rate : 0;
        return {
          ...b,
          rangeMin,
          rangeMax,
          taxableInRange,
          taxInRange,
          isActive: taxableIncome > b.min,
          isCurrent: bracket === b,
        };
      });

      return { tax: Math.max(0, Math.floor(tax)), bracket, bracketDetails };
    }

    function formatMoney(amount) {
      if (amount === '' || amount === null || amount === undefined) return '0';
      return Math.floor(Number(amount)).toLocaleString('ko-KR');
    }

    function formatManWon(amount) {
      if (!amount) return '0원';
      const man = amount / 10000;
      if (man >= 10000) {
        const eok = Math.floor(man / 10000);
        const remain = Math.floor(man % 10000);
        return remain > 0 ? `${eok}억 ${remain.toLocaleString()}만원` : `${eok}억원`;
      }
      if (man >= 1) return `${Math.floor(man).toLocaleString()}만원`;
      return `${formatMoney(amount)}원`;
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function Header() {
      return (
        <header className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-8 px-4">
          <div className="max-w-3xl mx-auto text-center">
            <h1 className="text-2xl md:text-3xl font-bold mb-2">종합소득세 계산기</h1>
            <p className="text-blue-100 text-sm md:text-base">2025년 귀속 종합소득세를 간편하게 계산해보세요</p>
          </div>
        </header>
      );
    }

    function TaxBracketTable({ bracketDetails, taxableIncome }) {
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-gray-200">
                <th className="text-left py-2 px-2 text-gray-500 font-medium">과세표준 구간</th>
                <th className="text-center py-2 px-2 text-gray-500 font-medium">세율</th>
                <th className="text-right py-2 px-2 text-gray-500 font-medium">해당 금액</th>
                <th className="text-right py-2 px-2 text-gray-500 font-medium">산출세액</th>
              </tr>
            </thead>
            <tbody>
              {bracketDetails.map((b, i) => (
                <tr
                  key={i}
                  className={`border-b border-gray-50 transition-colors ${
                    b.isCurrent ? 'bg-blue-50 font-semibold' : b.isActive ? 'bg-gray-50/50' : 'text-gray-300'
                  }`}
                >
                  <td className="py-2.5 px-2 text-xs md:text-sm whitespace-nowrap">
                    {formatManWon(b.rangeMin)} ~ {b.rangeMax ? formatManWon(b.rangeMax) : '초과'}
                    {b.isCurrent && <Badge color="blue">현재 구간</Badge>}
                  </td>
                  <td className="py-2.5 px-2 text-center">{(b.rate * 100).toFixed(0)}%</td>
                  <td className="py-2.5 px-2 text-right text-xs md:text-sm">
                    {b.isActive ? formatManWon(b.taxableInRange) : '-'}
                  </td>
                  <td className="py-2.5 px-2 text-right text-xs md:text-sm">
                    {b.isActive ? formatManWon(Math.floor(b.taxInRange)) : '-'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ========================================
    // 📄 Main Calculator Page
    // ========================================

    function Calculator() {
      const [income, setIncome] = useState('');
      const [businessIncome, setBusinessIncome] = useState('');
      const [otherIncome, setOtherIncome] = useState('');
      const [personalDeduction, setPersonalDeduction] = useState(1500000);
      const [dependents, setDependents] = useState(0);
      const [pensionDeduction, setPensionDeduction] = useState('');
      const [healthInsurance, setHealthInsurance] = useState('');
      const [otherDeduction, setOtherDeduction] = useState('');
      const [taxCredit, setTaxCredit] = useState('');
      const [prepaidTax, setPrepaidTax] = useState('');
      const [showResult, setShowResult] = useState(false);
      const resultRef = useRef(null);

      const totalIncome = useMemo(() => {
        return (Number(income) || 0) + (Number(businessIncome) || 0) + (Number(otherIncome) || 0);
      }, [income, businessIncome, otherIncome]);

      const totalDeductions = useMemo(() => {
        const personal = Number(personalDeduction) || 0;
        const dependentDeduction = (Number(dependents) || 0) * 1500000;
        const pension = Number(pensionDeduction) || 0;
        const health = Number(healthInsurance) || 0;
        const other = Number(otherDeduction) || 0;
        return personal + dependentDeduction + pension + health + other;
      }, [personalDeduction, dependents, pensionDeduction, healthInsurance, otherDeduction]);

      const taxableIncome = useMemo(() => {
        return Math.max(0, totalIncome - totalDeductions);
      }, [totalIncome, totalDeductions]);

      const result = useMemo(() => {
        const { tax, bracket, bracketDetails } = calculateTax(taxableIncome);
        const credit = Number(taxCredit) || 0;
        const afterCredit = Math.max(0, tax - credit);
        const localTax = Math.floor(afterCredit * LOCAL_TAX_RATE);
        const totalTax = afterCredit + localTax;
        const paid = Number(prepaidTax) || 0;
        const finalTax = totalTax - paid;
        const effectiveRate = totalIncome > 0 ? (totalTax / totalIncome) * 100 : 0;

        return {
          totalIncome,
          totalDeductions,
          taxableIncome,
          calculatedTax: tax,
          taxCredit: credit,
          afterCredit,
          localTax,
          totalTax,
          prepaidTax: paid,
          finalTax,
          effectiveRate,
          bracket,
          bracketDetails,
        };
      }, [taxableIncome, totalIncome, totalDeductions, taxCredit, prepaidTax]);

      const handleCalculate = useCallback(() => {
        setShowResult(true);
        setTimeout(() => {
          resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }, []);

      const handleReset = useCallback(() => {
        setIncome('');
        setBusinessIncome('');
        setOtherIncome('');
        setPersonalDeduction(1500000);
        setDependents(0);
        setPensionDeduction('');
        setHealthInsurance('');
        setOtherDeduction('');
        setTaxCredit('');
        setPrepaidTax('');
        setShowResult(false);
      }, []);

      return (
        <div className="max-w-3xl mx-auto px-4 py-6 space-y-6">
          {/* 소득 입력 */}
          <Card title="소득 정보" subtitle="종합소득에 해당하는 금액을 입력하세요">
            <InputField
              id="income"
              label="근로소득 (총급여)"
              value={income}
              onChange={setIncome}
              placeholder="0"
              helpText="연간 총급여액 (비과세 소득 제외)"
            />
            <InputField
              id="businessIncome"
              label="사업소득"
              value={businessIncome}
              onChange={setBusinessIncome}
              placeholder="0"
              helpText="필요경비를 차감한 사업소득금액"
            />
            <InputField
              id="otherIncome"
              label="기타소득 (이자, 배당, 연금 등)"
              value={otherIncome}
              onChange={setOtherIncome}
              placeholder="0"
            />
            {totalIncome > 0 && (
              <div className="mt-4 p-3 bg-blue-50 rounded-xl flex justify-between items-center">
                <span className="text-sm text-blue-700 font-medium">총 소득금액</span>
                <span className="text-lg font-bold text-blue-800">{formatMoney(totalIncome)}원</span>
              </div>
            )}
          </Card>

          {/* 공제 입력 */}
          <Card title="소득공제" subtitle="해당하는 공제 항목을 입력하세요">
            <InputField
              id="personalDeduction"
              label="기본공제 (본인)"
              value={personalDeduction}
              onChange={setPersonalDeduction}
              placeholder="1,500,000"
              helpText="본인 기본공제 150만원 (기본값)"
            />
            <div className="mb-4">
              <label htmlFor="dependents" className="block text-sm font-medium text-gray-700 mb-1.5">
                부양가족 수 (본인 제외)
              </label>
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setDependents(Math.max(0, dependents - 1))}
                  className="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg font-bold text-gray-600 transition-colors"
                  aria-label="부양가족 수 감소"
                >
                  -
                </button>
                <span className="w-12 text-center text-xl font-semibold text-gray-800">{dependents}</span>
                <button
                  onClick={() => setDependents(dependents + 1)}
                  className="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg font-bold text-gray-600 transition-colors"
                  aria-label="부양가족 수 증가"
                >
                  +
                </button>
                <span className="text-sm text-gray-400 ml-2">
                  (1인당 150만원 공제 = {formatMoney(dependents * 1500000)}원)
                </span>
              </div>
            </div>
            <InputField
              id="pensionDeduction"
              label="국민연금 보험료 공제"
              value={pensionDeduction}
              onChange={setPensionDeduction}
              placeholder="0"
            />
            <InputField
              id="healthInsurance"
              label="건강보험료 공제"
              value={healthInsurance}
              onChange={setHealthInsurance}
              placeholder="0"
            />
            <InputField
              id="otherDeduction"
              label="기타 소득공제 (신용카드, 주택 등)"
              value={otherDeduction}
              onChange={setOtherDeduction}
              placeholder="0"
            />
            {totalDeductions > 0 && (
              <div className="mt-4 p-3 bg-green-50 rounded-xl flex justify-between items-center">
                <span className="text-sm text-green-700 font-medium">총 소득공제액</span>
                <span className="text-lg font-bold text-green-800">{formatMoney(totalDeductions)}원</span>
              </div>
            )}
          </Card>

          {/* 세액공제 & 기납부세액 */}
          <Card title="세액공제 및 기납부세액">
            <InputField
              id="taxCredit"
              label="세액공제 합계"
              value={taxCredit}
              onChange={setTaxCredit}
              placeholder="0"
              helpText="근로소득세액공제, 자녀세액공제, 의료비·교육비 등"
            />
            <InputField
              id="prepaidTax"
              label="기납부세액 (원천징수 등)"
              value={prepaidTax}
              onChange={setPrepaidTax}
              placeholder="0"
              helpText="이미 납부한 세금 (원천징수, 중간예납 등)"
            />
          </Card>

          {/* 버튼 */}
          <div className="flex gap-3">
            <Button onClick={handleCalculate} className="flex-1" size="lg" disabled={totalIncome <= 0}>
              세금 계산하기
            </Button>
            <Button onClick={handleReset} variant="secondary" size="lg">
              초기화
            </Button>
          </div>

          {/* 결과 */}
          {showResult && (
            <div ref={resultRef} className="space-y-6 fade-in">
              {/* 요약 카드 */}
              <div className={`rounded-2xl p-6 text-white ${result.finalTax >= 0 ? 'bg-gradient-to-br from-blue-600 to-indigo-700' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>
                <p className="text-sm opacity-80 mb-1">
                  {result.finalTax >= 0 ? '납부할 세금' : '환급받을 세금'}
                </p>
                <p className="text-3xl md:text-4xl font-bold mb-4">
                  {result.finalTax < 0 && '-'}{formatMoney(Math.abs(result.finalTax))}원
                </p>
                <div className="grid grid-cols-2 gap-4 text-sm">
                  <div>
                    <p className="opacity-70">실효세율</p>
                    <p className="text-lg font-semibold">{result.effectiveRate.toFixed(2)}%</p>
                  </div>
                  <div>
                    <p className="opacity-70">적용 최고세율</p>
                    <p className="text-lg font-semibold">
                      {result.bracket ? `${(result.bracket.rate * 100).toFixed(0)}%` : '0%'}
                    </p>
                  </div>
                </div>
              </div>

              {/* 계산 과정 */}
              <Card title="계산 상세 내역">
                <div className="space-y-3">
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">총 소득금액</span>
                    <span className="font-semibold">{formatMoney(result.totalIncome)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">(-) 소득공제</span>
                    <span className="font-semibold text-green-600">-{formatMoney(result.totalDeductions)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-200 bg-gray-50 -mx-6 px-6">
                    <span className="font-bold text-gray-800">과세표준</span>
                    <span className="font-bold text-gray-800">{formatMoney(result.taxableIncome)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">산출세액</span>
                    <span className="font-semibold">{formatMoney(result.calculatedTax)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">(-) 세액공제</span>
                    <span className="font-semibold text-green-600">-{formatMoney(result.taxCredit)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">세액공제 후</span>
                    <span className="font-semibold">{formatMoney(result.afterCredit)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">(+) 지방소득세 (10%)</span>
                    <span className="font-semibold">{formatMoney(result.localTax)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-200 bg-gray-50 -mx-6 px-6">
                    <span className="font-bold text-gray-800">총 세금</span>
                    <span className="font-bold text-gray-800">{formatMoney(result.totalTax)}원</span>
                  </div>
                  <div className="flex justify-between py-2 border-b border-gray-100">
                    <span className="text-gray-600">(-) 기납부세액</span>
                    <span className="font-semibold text-green-600">-{formatMoney(result.prepaidTax)}원</span>
                  </div>
                  <div className={`flex justify-between py-3 -mx-6 px-6 rounded-xl ${result.finalTax >= 0 ? 'bg-blue-50' : 'bg-green-50'}`}>
                    <span className="font-bold text-lg">{result.finalTax >= 0 ? '납부할 세액' : '환급 세액'}</span>
                    <span className={`font-bold text-lg ${result.finalTax >= 0 ? 'text-blue-700' : 'text-green-700'}`}>
                      {result.finalTax < 0 && '-'}{formatMoney(Math.abs(result.finalTax))}원
                    </span>
                  </div>
                </div>
              </Card>

              {/* 세율 구간 테이블 */}
              <Card title="과세표준 구간별 세액" subtitle="2025년 귀속 종합소득세율 기준">
                <TaxBracketTable bracketDetails={result.bracketDetails} taxableIncome={result.taxableIncome} />
              </Card>

              {/* 세금 비율 시각화 */}
              {result.totalIncome > 0 && (
                <Card title="소득 대비 세금 비율">
                  <ProgressBar
                    value={result.totalDeductions}
                    max={result.totalIncome}
                    color="green"
                    label="소득공제율"
                  />
                  <ProgressBar
                    value={result.calculatedTax}
                    max={result.totalIncome}
                    color="blue"
                    label="산출세액 / 소득"
                  />
                  <ProgressBar
                    value={result.totalTax}
                    max={result.totalIncome}
                    color="purple"
                    label="실효세율 (지방소득세 포함)"
                  />
                </Card>
              )}
            </div>
          )}

          {/* 참고 사항 */}
          <div className="text-xs text-gray-400 text-center pb-8 space-y-1">
            <p>본 계산기는 참고용이며, 실제 세액과 다를 수 있습니다.</p>
            <p>정확한 세금 신고는 국세청 홈택스 또는 세무사에게 문의하세요.</p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="min-h-screen bg-gray-50">
          <Header />
          <Calculator />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
