<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled, onClick, className = '', children, ...rest }) {
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
        danger: 'bg-rose-500 hover:bg-rose-600 text-white',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-700',
      };
      const sizes = {
        sm: 'px-2.5 py-1 text-xs',
        md: 'px-3.5 py-2 text-sm',
        lg: 'px-5 py-2.5 text-base',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`rounded-lg font-medium transition disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ type = 'text', value, onChange, placeholder, className = '', ...rest }) {
      return (
        <input
          type={type}
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className={`w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent ${className}`}
          {...rest}
        />
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600 ${className}`}>
          {children}
        </span>
      );
    }

    function EmptyState({ title, description }) {
      return (
        <div className="flex flex-col items-center justify-center h-full text-center p-8">
          <div className="text-6xl mb-4 opacity-20">📝</div>
          <h3 className="text-lg font-semibold text-slate-700">{title}</h3>
          <p className="text-sm text-slate-500 mt-1">{description}</p>
        </div>
      );
    }

    // ========================================
    // 🛠 Helpers
    // ========================================

    const STORAGE_KEY = 'notepad.notes.v1';

    function loadNotes() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      const pad = (n) => String(n).padStart(2, '0');
      return sameDay
        ? `오늘 ${pad(d.getHours())}:${pad(d.getMinutes())}`
        : `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())}`;
    }

    function previewOf(content) {
      const text = (content || '').trim().split('\n').slice(1).join(' ').trim();
      return text || '내용 없음';
    }

    function titleOf(content) {
      const first = (content || '').split('\n')[0].trim();
      return first || '제목 없음';
    }

    // ========================================
    // 📄 Page: Notepad
    // ========================================

    function NotepadPage() {
      const [notes, setNotes] = useState(() => loadNotes());
      const [selectedId, setSelectedId] = useState(() => {
        const initial = loadNotes();
        return initial[0]?.id ?? null;
      });
      const [query, setQuery] = useState('');
      const textareaRef = useRef(null);

      useEffect(() => { saveNotes(notes); }, [notes]);

      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        const sorted = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
        if (!q) return sorted;
        return sorted.filter(n => n.content.toLowerCase().includes(q));
      }, [notes, query]);

      const selected = notes.find(n => n.id === selectedId) || null;

      const handleNew = () => {
        const note = {
          id: crypto.randomUUID(),
          content: '',
          createdAt: Date.now(),
          updatedAt: Date.now(),
        };
        setNotes(prev => [note, ...prev]);
        setSelectedId(note.id);
        setTimeout(() => textareaRef.current?.focus(), 0);
      };

      const handleChange = (e) => {
        const value = e.target.value;
        setNotes(prev => prev.map(n =>
          n.id === selectedId ? { ...n, content: value, updatedAt: Date.now() } : n
        ));
      };

      const handleDelete = (id) => {
        if (!confirm('이 메모를 삭제하시겠어요?')) return;
        setNotes(prev => {
          const next = prev.filter(n => n.id !== id);
          if (id === selectedId) setSelectedId(next[0]?.id ?? null);
          return next;
        });
      };

      return (
        <div className="h-screen flex flex-col">
          <header className="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-2xl">📝</span>
              <h1 className="text-lg sm:text-xl font-bold text-slate-800">메모장</h1>
              <Badge className="ml-2">{notes.length}개</Badge>
            </div>
            <Button onClick={handleNew} size="md">+ 새 메모</Button>
          </header>

          <div className="flex-1 flex overflow-hidden">
            <aside className="w-72 sm:w-80 border-r border-slate-200 bg-white flex flex-col">
              <div className="p-3 border-b border-slate-200">
                <Input
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  placeholder="메모 검색..."
                />
              </div>
              <div className="flex-1 overflow-y-auto scrollbar-thin">
                {filtered.length === 0 ? (
                  <div className="p-6 text-center text-sm text-slate-400">
                    {query ? '검색 결과가 없습니다' : '메모가 없습니다'}
                  </div>
                ) : (
                  <ul>
                    {filtered.map(note => {
                      const isActive = note.id === selectedId;
                      return (
                        <li
                          key={note.id}
                          onClick={() => setSelectedId(note.id)}
                          className={`group cursor-pointer px-4 py-3 border-b border-slate-100 transition ${
                            isActive ? 'bg-indigo-50 border-l-4 border-l-indigo-500' : 'hover:bg-slate-50'
                          }`}
                        >
                          <div className="flex items-start justify-between gap-2">
                            <div className="min-w-0 flex-1">
                              <h3 className="font-semibold text-sm text-slate-800 truncate">
                                {titleOf(note.content)}
                              </h3>
                              <p className="text-xs text-slate-500 truncate mt-0.5">
                                {previewOf(note.content)}
                              </p>
                              <p className="text-[11px] text-slate-400 mt-1">
                                {formatDate(note.updatedAt)}
                              </p>
                            </div>
                            <button
                              onClick={(e) => { e.stopPropagation(); handleDelete(note.id); }}
                              className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-rose-500 transition"
                              aria-label="메모 삭제"
                            >
                              ✕
                            </button>
                          </div>
                        </li>
                      );
                    })}
                  </ul>
                )}
              </div>
            </aside>

            <main className="flex-1 flex flex-col bg-slate-50">
              {selected ? (
                <>
                  <div className="px-6 py-3 border-b border-slate-200 bg-white flex items-center justify-between">
                    <div className="text-xs text-slate-500">
                      마지막 수정: {formatDate(selected.updatedAt)}
                    </div>
                    <Button variant="danger" size="sm" onClick={() => handleDelete(selected.id)}>
                      삭제
                    </Button>
                  </div>
                  <textarea
                    ref={textareaRef}
                    value={selected.content}
                    onChange={handleChange}
                    placeholder={'첫 줄은 제목이 됩니다.\n여기에 내용을 적어보세요...'}
                    className="flex-1 w-full p-6 sm:p-8 bg-transparent resize-none focus:outline-none text-slate-800 leading-relaxed text-base"
                  />
                </>
              ) : (
                <EmptyState
                  title="선택된 메모가 없습니다"
                  description="좌측에서 메모를 선택하거나 새 메모를 만들어보세요."
                />
              )}
            </main>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      return <NotepadPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
