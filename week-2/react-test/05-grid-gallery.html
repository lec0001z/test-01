<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그리드 갤러리</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
    }

    .page-title {
      text-align: center;
      color: white;
      font-size: 32px;
      margin-bottom: 32px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .gallery-item {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
    }

    .gallery-item .color-block {
      width: 100%;
      height: 100%;
      transition: transform 0.3s, filter 0.3s;
    }

    .gallery-item:hover .color-block {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .gallery-item .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      color: white;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    .overlay h4 {
      margin: 0 0 4px;
      font-size: 16px;
    }

    .overlay p {
      margin: 0;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <h1 class="page-title">그리드 갤러리</h1>
  <div class="gallery">
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);"></div>
      <div class="overlay">
        <h4>선셋 레드</h4>
        <p>#ff6b6b → #ee5a24</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #48dbfb, #0abde3);"></div>
      <div class="overlay">
        <h4>오션 블루</h4>
        <p>#48dbfb → #0abde3</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #feca57, #ff9f43);"></div>
      <div class="overlay">
        <h4>골든 옐로우</h4>
        <p>#feca57 → #ff9f43</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #5f27cd, #341f97);"></div>
      <div class="overlay">
        <h4>딥 퍼플</h4>
        <p>#5f27cd → #341f97</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #1dd1a1, #10ac84);"></div>
      <div class="overlay">
        <h4>민트 그린</h4>
        <p>#1dd1a1 → #10ac84</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="color-block" style="background: linear-gradient(135deg, #f368e0, #e056a0);"></div>
      <div class="overlay">
        <h4>핑크 로즈</h4>
        <p>#f368e0 → #e056a0</p>
      </div>
    </div>
  </div>
</body>
</html>
